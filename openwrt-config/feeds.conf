# oxwrt feeds configuration.
#
# The "oxwrt" feed points at our local package directory. OpenWRT's
# standard feeds (packages, luci, routing, telephony) are included for
# their kernel module packages (kmod-nft-*, kmod-ath12k, etc.) but we
# don't install any of their userspace packages.

src-link oxwrt ../../openwrt-packages

# Standard OpenWRT feeds — needed for kernel module packages.
src-git packages https://git.openwrt.org/feed/packages.git
src-git luci https://git.openwrt.org/project/luci.git
src-git routing https://git.openwrt.org/feed/routing.git
