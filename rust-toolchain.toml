[toolchain]
# Pin stable to a specific minor version so new clippy lints don't
# surprise CI between commits. CI (dtolnay/rust-toolchain@stable)
# and `make ci-check` both honor this file.
#
# Bump procedure: update the channel, run `make ci-check` locally to
# pick up any new lints, fix them in the same PR as the bump. Treat
# as a normal dependency update — deliberate, not automatic.
#
# Related: the linux-only crates (`oxwrt-linux`, `oxwrtd`) compile
# to no-op on macOS via `#![cfg(target_os = "linux")]`, so `cargo
# clippy` on a mac misses their lints entirely. `make ci-check`
# runs the same clippy invocation inside a Linux container to
# catch those pre-push.
channel = "1.95.0"
components = ["rustfmt", "clippy"]
# Targets whose std-lib must be pre-installed for the pinned
# channel. rustup auto-installs these on first `cargo` in the
# workspace; omitting one breaks cross-compiles with E0463
# "can't find crate for std/core". Adding a target via
# `rustup target add` outside this file attaches it to whatever
# channel was last defaulted — NOT the pinned channel — so cargo
# inside the workspace won't see it.
#
# Members:
#   aarch64-unknown-linux-musl — oxwrtd + oxctl for the router
#                                (MT6000). Primary cross-compile.
#   x86_64-apple-darwin        — oxctl for Intel Macs; attached
#                                to the GitHub release.
#   aarch64-apple-darwin       — oxctl for Apple Silicon Macs;
#                                attached to the GitHub release.
targets = [
    "aarch64-unknown-linux-musl",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
]
