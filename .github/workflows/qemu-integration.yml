name: QEMU integration test

# Exercises oxwrtd in a real aarch64 Linux VM and runs the oxctl RPC
# suite against it (30 assertions). Complements the Docker harness
# (not wired to CI yet — shares the host kernel, skips landlock /
# clone3 userns / real rtnetlink). This is the pre-flash gate.
#
# Runs under QEMU TCG emulation on GitHub's x86_64 Ubuntu runners —
# slower than the ~4s local boot on an M1 (HVF), but still finishes
# in under ~8 minutes wall for a full run. Image download + cargo
# deps are cached across runs to keep typical runs ~2-3 min.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  # Cancel in-flight runs on the same ref — pushes to a PR branch
  # should not pile up QEMU jobs.
  group: qemu-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qemu-test:
    name: QEMU aarch64 RPC suite
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        # Most steps run from the oxwrt checkout. The sibling
        # squic-rust checkout lives alongside it so the path-dep
        # `../squic-rust` in Cargo.toml resolves.
        working-directory: oxwrt
    env:
      # Bump VM boot budget — TCG emulation of aarch64 on x86_64
      # is ~20-40x slower than HVF on native arm64, so the 120s
      # default is tight. Most runs are ready well under this.
      BOOT_TIMEOUT_S: 300
      CARGO_TERM_COLOR: always

    steps:
      - uses: actions/checkout@v4
        with:
          path: oxwrt

      # squic is a path-dep at `../squic-rust` from the workspace
      # root (see Cargo.toml [workspace.dependencies]). Check out the
      # sibling repo so cargo can resolve it. Public repo, no token
      # needed.
      - uses: actions/checkout@v4
        with:
          repository: wave-cl/squic-rust
          path: squic-rust

      # ── Rust toolchain + targets ─────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      # ── Cache: cargo registry + git + target dir ─────────────────
      # Keyed on Cargo.lock so any dep change invalidates. Scoped to
      # the workflow because build profile differs from other jobs.
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            oxwrt/target
          key: ${{ runner.os }}-qemu-cargo-${{ hashFiles('oxwrt/**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-qemu-cargo-

      # ── Zig + cargo-zigbuild (cross-compile to aarch64-musl) ─────
      # zigbuild is used by the rest of the repo's build pipeline;
      # staying on it here keeps local-dev vs CI one codepath.
      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.14.0
      - name: install cargo-zigbuild
        run: cargo install --locked cargo-zigbuild

      # ── QEMU + EFI firmware ─────────────────────────────────────
      - name: install qemu
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-arm qemu-efi-aarch64

      # ── Cache: OpenWrt armsr/armv8 image download ───────────────
      # The script caches into /tmp/armvirt-qemu/ — we pre-seed the
      # directory so re-runs don't re-download the 15 MB image.gz.
      - name: cache OpenWrt image
        uses: actions/cache@v4
        with:
          path: /tmp/armvirt-qemu
          key: openwrt-armsr-armv8-25.12.2

      # ── Build ───────────────────────────────────────────────────
      - name: build oxwrtd (aarch64-musl)
        run: cargo zigbuild --release --target aarch64-unknown-linux-musl -p oxwrtd

      - name: build oxctl (host)
        run: cargo build --release -p oxwrtctl-cli

      # ── Run the harness ─────────────────────────────────────────
      - name: qemu integration test
        run: ./scripts/qemu-integration-test.sh

      # ── Failure diagnostics ─────────────────────────────────────
      - name: dump boot log on failure
        if: failure()
        run: |
          echo "=== tail of /tmp/armvirt-qemu/boot.log ==="
          tail -200 /tmp/armvirt-qemu/boot.log || true

      - name: upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-boot-log
          path: /tmp/armvirt-qemu/boot.log
          if-no-files-found: ignore
