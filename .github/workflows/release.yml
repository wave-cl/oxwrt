name: Release

# Tag-triggered release pipeline. On `v*` tag push, three jobs
# fan out then back in:
#
#   build-linux   — ubuntu-latest. Cross-builds oxwrtd + oxctl for
#                   the router (aarch64-musl) and the Linux client
#                   (x86_64 + aarch64-musl), runs `make imagebuilder-
#                   image` in Docker, signs the .bin with
#                   OXWRT_SIGNING_KEY, uploads the five artifacts
#                   (.bin, .bin.sig, oxctl-linux-*) for the publish
#                   job.
#   build-darwin  — macos-latest. Native-builds oxctl for both
#                   Apple Silicon (aarch64-apple-darwin) and Intel
#                   (x86_64-apple-darwin). Has to live on a macOS
#                   runner because the Apple SDK (Security.framework,
#                   CoreFoundation.framework) isn't on ubuntu runners
#                   and cargo-zigbuild can't substitute for it. Both
#                   archs build via `rustup target add` + cargo —
#                   macOS's Xcode ships the cross-SDK for both.
#   publish       — ubuntu-latest, needs both build-* jobs. Pulls
#                   every artifact from the upstream jobs, extracts
#                   the CHANGELOG section for the tag, and invokes
#                   softprops/action-gh-release to create the release
#                   with six assets attached.
#
# Concurrency: one release run per tag. Cancel-in-progress is OFF —
# a half-done release leaves artifacts in an ambiguous state on the
# GitHub UI; we'd rather let it finish or fail cleanly.
#
# Permissions: `contents: write` on the publish job for softprops.
# GITHUB_TOKEN is scoped to this repo only.
#
# See RELEASING.md for the end-to-end operator runbook.

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Linux: oxwrtd + oxctl-linux-* + sysupgrade image + sign ─────
  build-linux:
    name: Build Linux + image (${{ github.ref_name }})
    runs-on: ubuntu-latest
    timeout-minutes: 40
    outputs:
      image_name: ${{ steps.image.outputs.name }}

    steps:
      - name: checkout oxwrt
        uses: actions/checkout@v4
        with:
          path: oxwrt

      - name: checkout squic-rust sibling
        uses: actions/checkout@v4
        with:
          repository: wave-cl/squic-rust
          path: squic-rust

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: install zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.14.0

      - name: install cargo-zigbuild
        run: cargo install --locked cargo-zigbuild

      # QEMU binfmt handlers for arm64 containers. The services-*
      # Makefile targets run `docker --platform linux/arm64
      # alpine:3.20` to stage aarch64 binaries into the image; without
      # binfmt registered, the x86_64 runner fails with `exec /bin/sh:
      # exec format error`.
      - name: register qemu binfmt handlers (arm64)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            oxwrt/target
          key: ${{ runner.os }}-release-cargo-${{ hashFiles('oxwrt/**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-release-cargo-

      - name: cache openwrt imagebuilder
        uses: actions/cache@v4
        with:
          path: oxwrt/imagebuilder
          key: openwrt-imagebuilder-25.12.2-mediatek-filogic

      - name: cross-build oxwrtd (aarch64-musl)
        working-directory: oxwrt
        run: |
          cargo zigbuild --release \
            --target aarch64-unknown-linux-musl -p oxwrtd

      - name: build oxctl (host Linux-x86_64)
        working-directory: oxwrt
        run: cargo build --release -p oxwrtctl-cli

      - name: cross-build oxctl (Linux-aarch64-musl)
        working-directory: oxwrt
        run: |
          cargo zigbuild --release \
            --target aarch64-unknown-linux-musl -p oxwrtctl-cli

      - name: download openwrt imagebuilder
        working-directory: oxwrt
        run: |
          if [ ! -d imagebuilder/openwrt-imagebuilder-25.12.2-mediatek-filogic.Linux-x86_64 ]; then
            mkdir -p imagebuilder
            cd imagebuilder
            curl -fsSL \
              https://downloads.openwrt.org/releases/25.12.2/targets/mediatek/filogic/openwrt-imagebuilder-25.12.2-mediatek-filogic.Linux-x86_64.tar.zst \
              -o imagebuilder.tar.zst
            tar --zstd -xf imagebuilder.tar.zst
            rm imagebuilder.tar.zst
          fi

      # Decode the public pubkey-hex repo variable into
      # provisioning/release-pubkey.ed25519 where imagebuilder-stage
      # (Makefile:916-927) picks it up. Public by design — every
      # image bakes the same pubkey.
      - name: bake release pubkey
        if: vars.OXWRT_RELEASE_PUBKEY_HEX != ''
        working-directory: oxwrt
        run: |
          mkdir -p provisioning
          echo "${{ vars.OXWRT_RELEASE_PUBKEY_HEX }}" \
            | xxd -r -p > provisioning/release-pubkey.ed25519
          test "$(wc -c < provisioning/release-pubkey.ed25519)" = 32
          echo "baked release-pubkey.ed25519 (32 bytes)"

      - name: build sysupgrade image
        working-directory: oxwrt
        run: make imagebuilder-image

      # docker-on-Linux runs the container as root, so .bin +
      # parent dir end up uid 0. Chown back to the runner before
      # any step that writes a sibling file.
      - name: chown imagebuilder output back to runner
        working-directory: oxwrt
        run: sudo chown -R "$(id -u):$(id -g)" imagebuilder/

      - name: locate sysupgrade image
        id: image
        working-directory: oxwrt
        run: |
          IMG=$(find imagebuilder/*/bin -name '*-sysupgrade.bin' | head -1)
          if [ -z "$IMG" ]; then
            echo "No sysupgrade .bin found" >&2
            find imagebuilder -name '*.bin' >&2 || true
            exit 1
          fi
          echo "path=$IMG" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$IMG")" >> "$GITHUB_OUTPUT"
          ls -lh "$IMG"

      - name: sign sysupgrade image
        working-directory: oxwrt
        env:
          OXWRT_SIGNING_KEY: ${{ secrets.OXWRT_SIGNING_KEY }}
        run: |
          if [ -z "$OXWRT_SIGNING_KEY" ]; then
            echo "::warning::OXWRT_SIGNING_KEY repo secret not set — publishing unsigned image"
            exit 0
          fi
          ./target/release/oxctl --sign "${{ steps.image.outputs.path }}"
          ls -lh "${{ steps.image.outputs.path }}.sig"

      - name: stage linux artifacts
        working-directory: oxwrt
        run: |
          mkdir -p release
          cp "${{ steps.image.outputs.path }}" release/
          if [ -f "${{ steps.image.outputs.path }}.sig" ]; then
            cp "${{ steps.image.outputs.path }}.sig" release/
          fi
          cp target/release/oxctl release/oxctl-linux-x86_64
          cp target/aarch64-unknown-linux-musl/release/oxctl \
             release/oxctl-linux-aarch64-musl
          ls -lh release/

      - name: upload linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: oxwrt/release/
          retention-days: 7

  # ── Darwin: oxctl-darwin-x86_64 + oxctl-darwin-aarch64 ──────────
  #
  # Has to live on a macOS runner because the Apple SDK
  # (Security.framework, CoreFoundation.framework) isn't present
  # on ubuntu-latest and cargo-zigbuild can't substitute for it
  # (prior attempt: `error: unable to find framework 'Security'`).
  # Xcode on macos-latest ships both archs' SDKs, so rustup +
  # cargo handle both targets natively without any cross-compile
  # plumbing.
  build-darwin:
    name: Build Darwin oxctl (${{ github.ref_name }})
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: checkout oxwrt
        uses: actions/checkout@v4
        with:
          path: oxwrt

      - name: checkout squic-rust sibling
        uses: actions/checkout@v4
        with:
          repository: wave-cl/squic-rust
          path: squic-rust

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin, aarch64-apple-darwin

      - name: cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            oxwrt/target
          key: ${{ runner.os }}-darwin-cargo-${{ hashFiles('oxwrt/**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-darwin-cargo-

      # macos-latest runners are currently Apple Silicon (macos-14).
      # Building x86_64-apple-darwin from there is a standard
      # cross-compile — Xcode's SDK covers both archs, so cargo does
      # it natively without any zigbuild / special linker shim.
      - name: build oxctl (Darwin-aarch64)
        working-directory: oxwrt
        run: |
          cargo build --release \
            --target aarch64-apple-darwin -p oxwrtctl-cli

      - name: build oxctl (Darwin-x86_64)
        working-directory: oxwrt
        run: |
          cargo build --release \
            --target x86_64-apple-darwin -p oxwrtctl-cli

      - name: stage darwin artifacts
        working-directory: oxwrt
        run: |
          mkdir -p release
          cp target/aarch64-apple-darwin/release/oxctl \
             release/oxctl-darwin-aarch64
          cp target/x86_64-apple-darwin/release/oxctl \
             release/oxctl-darwin-x86_64
          ls -lh release/

      - name: upload darwin artifacts
        uses: actions/upload-artifact@v4
        with:
          name: darwin-release
          path: oxwrt/release/
          retention-days: 7

  # ── Publish: pull both fan-in artifacts + create GitHub release ─
  publish:
    name: Publish ${{ github.ref_name }}
    runs-on: ubuntu-latest
    needs: [build-linux, build-darwin]
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: checkout oxwrt
        uses: actions/checkout@v4
        with:
          path: oxwrt
          fetch-depth: 0

      - name: download linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-release
          path: release/

      - name: download darwin artifacts
        uses: actions/download-artifact@v4
        with:
          name: darwin-release
          path: release/

      - name: list collected artifacts
        run: ls -lh release/

      # Extract the CHANGELOG section for this tag — the text
      # `release.sh` prepends between `## [X.Y.Z]` and the next
      # `## ` heading. Fallback to the tag message if CHANGELOG
      # doesn't have a matching section.
      - name: extract release notes
        working-directory: oxwrt
        env:
          TAG_VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_VERSION#v}"
          awk -v ver="$VERSION" '
            $0 ~ ("^## \\[" ver "\\]") { inside = 1; print; next }
            inside && /^## / { inside = 0 }
            inside { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "CHANGELOG missing section for $TAG_VERSION — falling back to tag message"
            git for-each-ref --format='%(contents)' \
              "refs/tags/$TAG_VERSION" > release-notes.md
          fi
          head -20 release-notes.md

      - name: publish github release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: oxwrt ${{ github.ref_name }}
          body_path: oxwrt/release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          # Signing skipped when OXWRT_SIGNING_KEY is unset; the
          # missing `.sig` shouldn't fail the release.
          fail_on_unmatched_files: false
          files: |
            release/${{ needs.build-linux.outputs.image_name }}
            release/${{ needs.build-linux.outputs.image_name }}.sig
            release/oxctl-linux-x86_64
            release/oxctl-linux-aarch64-musl
            release/oxctl-darwin-x86_64
            release/oxctl-darwin-aarch64
