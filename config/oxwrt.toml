# oxwrt example configuration.
#
# This file is parsed by `config::Config` (crates/oxwrt-api/src/config.rs)
# and ships at /etc/oxwrt/oxwrt.toml. Every knob the firmware supports
# today appears somewhere below — use it as a cookbook. Fields with
# defaults can be omitted; commented-out lines show the default value
# where relevant.
#
# A matching parse test (`config::tests::example_config_parses`) loads
# this file at `cargo test` time, so any schema change that breaks the
# example also breaks the build — forces both to stay in sync.
#
# ── Secrets ──
# This file is the PUBLIC half of a two-file config. Short inline
# secrets (WiFi passphrases, DDNS tokens, WG peer PSKs, PPPoE
# passwords) live in a sibling `oxwrt.secrets.toml` (mode 0600) and
# are deep-merged on load by identity key. `oxctl dump-config`
# prints the merged view with every secret leaf replaced by
# `<redacted>` — safe to paste into an issue.
#
# See `oxwrt.secrets.toml.example` next to this file for the overlay
# shape. An `OXWRT_SECRET__<section>__<id>__<field>` env var wins
# over both files — useful for CI or systemd-creds style injection.
#
# The daemon migrates a pre-split `oxwrt.toml` automatically on
# first boot after the upgrade: any inline secret leaf is moved
# into a newly-created `oxwrt.secrets.toml`, leaving this public
# file genuinely publishable.
#
# ── Cryptographic identity vs. configuration ──
# The TOML pair describes CONFIG. It references four classes of
# IDENTITY artifact that live as separate files (not inline):
#
#   /etc/oxwrt/key.ed25519     sQUIC server signing seed. Auto-
#                              generated on first boot if missing.
#                              Clients pin its derived pubkey via
#                              SQUIC_SERVER_KEY — print it with
#                              `oxctl --print-server-key` on-device.
#   /etc/oxwrt/wg0.key         WireGuard server private key. Auto-
#                              generated on first boot. Peers pin
#                              its pubkey (derive with `wg pubkey`).
#   /etc/oxwrt/vpn/<name>.key  VPN client private key(s). Provider-
#                              issued (Mullvad / Proton portal) —
#                              operator stages these; no auto-gen.
#   /etc/oxwrt/dhcp6-duid      DHCPv6 DUID-LL, derived once from
#                              WAN MAC. Preserved across reboots so
#                              ISP-side PD bindings don't rotate.
#
# These live OUTSIDE the TOML pair on purpose: a pasted oxwrt.toml
# in a bug report should never leak device identity, and a restored
# backup shouldn't silently replace another router's crypto identity
# with someone else's. Schema fields reference them via `*_path`.
#
# Section index:
#   networks       WAN + LAN + Simple (guest/iot/VLAN); multi-WAN
#                  failover via priority/probe_target
#   firewall       zones + explicit rules (no magic booleans) +
#                  optional `schedule` field for time-based rules +
#                  raw_nft escape hatch for unusual rule shapes
#   ddns           DuckDNS + Cloudflare + Namecheap + dynv6 + HE.net
#   port_forwards  external WAN port → internal host:port
#   routes         static IPv4 routes
#   routes6        static IPv6 routes
#   blocklists     banip-style periodic CIDR drop sets
#   wireguard      roadwarrior + site-to-site tunnels (server side)
#   vpn_client     outbound WG tunnels to commercial VPN providers
#                  (full-tunnel v4+v6, killswitch, multi-profile
#                  failover, per-zone opt-in via `via_vpn`, dest
#                  bypass CIDRs, Mullvad API relay picker)
#   radios         per-phy wifi config
#   wifi           per-SSID wifi config (multi-BSS capable)
#   dns            hickory-dns forwarding resolver (listen, DoH/DoQ
#                  upstreams) — rendered to /etc/oxwrt/named.toml
#                  and bind-mounted into the dns service
#   dhcp           coredhcp server (network, lease_time, pool, dns,
#                  gateway) — rendered to /etc/oxwrt/coredhcp.yml
#   ntp            ntpd-rs client + LAN server (sources, listen,
#                  poll intervals) — rendered to /etc/oxwrt/ntp.toml
#   services       containerized services (dns, dhcp, hostapd, …)
#   upnp           miniupnpd renderer (iptables binary staged;
#                  nftables source-build pending)
#   metrics        Prometheus /metrics endpoint
#   backup_sftp    scheduled off-router config backups via SSH
#   control        sQUIC control-plane listen addrs + authorized keys

hostname = "flint2"
timezone = "Europe/Berlin"

# ---------------- Networks ----------------
#
# All networks in one unified array. The `type` tag picks the variant:
# "wan", "lan", or "simple". Firewall policy lives in [[firewall.zones]].

# --- WAN ---
# `mode` picks between "dhcp", "static", and "pppoe". This example uses
# dhcp (the GL.iNet default); swap the fields for one of the alternatives
# below when you need a static IP or a PPPoE link.

[[networks]]
name = "wan"
type = "wan"
iface = "eth1"
mode = "dhcp"
# Failover priority for multi-WAN deployments. Lower = higher
# preference (iproute2 convention). The failover coordinator
# picks the lowest-priority healthy WAN as the active egress
# and mirrors its lease into the default route + DDNS. Single-
# WAN setups can leave this at the default 100.
# priority = 100
#
# Optional active health-check target: when set, oxwrtd pings
# this address through the WAN's iface every 5s. Three fails
# in a row flip the WAN to unhealthy, triggering failover even
# if the DHCP lease is still "valid." Covers the "carrier +
# lease fine but ISP upstream is dead" case that pure lease-
# state health misses. Omit to use lease-state alone.
# probe_target = "1.1.1.1"
#
# DHCPv4 client identity options — sent in DISCOVER + REQUEST to
# the ISP's DHCP server. Most residential ISPs don't look at
# these; set them only when your ISP requires them.
#   send_hostname: Send option 12 (defaults to [hostname]).
#   hostname_override: Override the value sent (rare).
#   vendor_class_id: Option 60 — DOCSIS / business circuits key on
#                    this. Omit for home ISPs.
# send_hostname = true
# hostname_override = "my-isp-registered-name"
# vendor_class_id = "MSFT 5.0"
#
# Override the WAN iface MAC before bring-up. Required for DOCSIS
# cable ISPs that pin service to the MAC of the previously-
# registered modem. Multicast MACs (low bit of first octet set)
# are rejected.
# mac_address = "aa:bb:cc:dd:ee:ff"
#
# Request a DHCPv6 prefix delegation (IA_PD) from the ISP in
# parallel with the IPv4 lease. The delegated prefix is sliced
# into per-subnet /64s via each network's `ipv6_subnet_id`. Set
# to true once your ISP supports IPv6 PD.
# ipv6_pd = true
# SQM / CAKE for bufferbloat control. Uncomment + set to your
# actual measured speeds × 0.9 (leaving 10% headroom prevents
# the ISP's own queue from filling). kbit/s units. Without
# `sqm`, the iface uses pfifo_fast and can bufferbloat under
# load. See crates/oxwrt-linux/src/sqm.rs for impl.
#
# sqm = { bandwidth_up_kbps = 18000, bandwidth_down_kbps = 180000 }
#
# Extra CAKE args (optional): "docsis" for cable, "ethernet"
# for most home WAN, "ptm" for VDSL. "nat" enables NAT-aware
# fair-queueing across LAN flows.
#
# sqm = { bandwidth_up_kbps = 18000, bandwidth_down_kbps = 180000, extra_args = "ethernet nat" }

# --- Multi-WAN failover example (commented) ---
#
# Declare a second WAN with a higher `priority` number (lower
# preference). oxwrtd spawns a DHCP client per WAN in parallel;
# the failover coordinator picks the lowest-priority healthy
# one every 2 seconds and swaps the default route + SNAT
# accordingly. Add both WAN names to the `wan` firewall zone's
# networks array so rules apply regardless of which is active.
#
# [[networks]]
# name = "wan-backup"
# type = "wan"
# iface = "eth2"              # e.g. LTE modem, second ISP port
# mode = "dhcp"
# priority = 200              # higher number = lower preference
# probe_target = "8.8.8.8"    # independent probe target

# [[networks]]                         # alternative: static IPv4 on eth1
# name = "wan"
# type = "wan"
# iface = "eth1"
# mode = "static"
# address = "203.0.113.42"
# prefix = 24
# gateway = "203.0.113.1"
# dns = ["1.1.1.1", "9.9.9.9"]

# [[networks]]                         # alternative: PPPoE
# name = "wan"
# type = "wan"
# iface = "eth1"
# mode = "pppoe"
# username = "user@isp"
# password = "secret"

# --- LAN ---

[[networks]]
name = "lan"
type = "lan"
bridge = "br-lan"
members = ["lan1", "lan2", "lan3", "lan4", "lan5"]
# VLAN-aware bridging (802.1Q filtering on br-lan). When true,
# `vlan_ports` assigns per-port VIDs — access ports declare
# pvid (default untagged VID), trunk ports declare tagged VIDs,
# hybrid ports declare both. Without this flag, every member
# port forwards everything untagged and vlan_ports is ignored.
# The dot-notation alternative (e.g. `eth0.10` subifaces in a
# Simple network) is simpler for one-or-two-VLAN setups; turn
# on vlan_filtering here for managed-switch-style trunking.
#
# vlan_filtering = false
#
# vlan_ports = [
#   { iface = "lan4", pvid = 10 },                    # access port VID 10
#   { iface = "lan5", tagged = [1, 10, 20] },         # trunk: mgmt + 10 + 20
#   { iface = "lan3", pvid = 1, tagged = [10] },      # hybrid: default + VID 10 tagged
# ]
address = "192.168.50.1"
prefix = 24
# IPv6 ULA (fd00::/8, RFC 4193). Chosen deterministically rather
# than random so flashes are reproducible — swap to a delegated
# prefix once DHCPv6-PD lands. Paired with an auto-generated
# corerad RA config (see oxwrt-linux/src/corerad.rs).
ipv6_address = "fdbe:cafe::1"
ipv6_prefix = 64
# Subnet id within the DHCPv6-PD delegated prefix. When the WAN has
# `ipv6_pd = true` and the ISP hands over e.g. a /56, this network
# gets a /64 at `<prefix>:0001::/64` with `::1` as the router. Keep
# these unique across all networks — collisions mean address
# conflicts on the PD side. Ignored when `ipv6_pd` is off.
ipv6_subnet_id = 1

# --- Guest ---

[[networks]]
name = "guest"
type = "simple"
iface = "br-guest"
address = "10.99.0.1"
prefix = 24
ipv6_subnet_id = 2
# Optional ULA fallback when DHCPv6-PD isn't available. Without
# ipv6_address, this network is IPv4-only until the PD kicks in.
# ipv6_address = "fdbe:cafe:2::1"
# ipv6_prefix = 64

# --- IoT ---

[[networks]]
name = "iot"
type = "simple"
iface = "br-iot"
address = "10.20.0.1"
prefix = 24
ipv6_subnet_id = 3

# ── VLAN-tagged Simple network example (commented) ──
# 802.1Q sub-iface on top of eth0. oxwrtd creates eth0.10 at boot
# via rtnetlink (InfoKind::Vlan), then assigns 10.10.0.1/24 on it.
# Both `vlan` and `vlan_parent` are required together — validate.rs
# rejects one without the other so a typo doesn't silently produce
# an untagged iface. Pair with a firewall zone to gate traffic.
#
# [[networks]]
# name = "voip"
# type = "simple"
# iface = "eth0.10"
# vlan = 10
# vlan_parent = "eth0"
# address = "10.10.0.1"
# prefix = 24

# ---------------- Firewall ----------------
#
# All firewall policy in one place. Zones declare default chain policies;
# rules declare explicit accepts/drops/DNATs. No boolean shortcuts —
# every firewall behavior is an explicit rule.

[[firewall.zones]]
name = "lan"
networks = ["lan"]
default_input = "accept"
default_forward = "drop"
# default_output gates kernel-originated traffic on this zone's
# ifaces — the daemon's own DNS lookups, outbound firmware updates,
# etc. Defaults to "accept"; set to "drop" for a containment zone
# where a hijacked local process must NOT be able to egress via
# this zone's member ifaces. Rare — leave unset unless you have a
# concrete reason.
# default_output = "accept"

[[firewall.zones]]
name = "guest"
networks = ["guest"]
default_input = "drop"
default_forward = "drop"
# Per-zone WAN selection (multi-WAN deployments only). When set,
# forwarded traffic from this zone routes through the named
# WAN's per-WAN table regardless of the failover coordinator's
# active pick — static source-based split. Leave unset to
# follow the coordinator.
# wan = "wan-backup"
# Or route through the active VPN tunnel instead:
# via_vpn = true

[[firewall.zones]]
name = "wan"
# For multi-WAN deployments, list every WAN network's `name` here
# so rules apply regardless of which link is active right now —
# e.g. `networks = ["wan", "wan-backup"]`. Masquerade then
# installs on each iface in turn.
networks = ["wan"]
default_input = "drop"
default_forward = "drop"
masquerade = true

# Established/related is installed as a baseline default now (no
# operator rule required) along with `ct state invalid drop`,
# ICMPv6 NDP/MLD/packet-too-big, and ICMP/ICMPv6 echo-request on
# INPUT. Keeping this rule is harmless — the baseline fires first
# and this one just re-asserts the same verdict.
[[firewall.rules]]
name = "ct-established"
action = "accept"
ct_state = ["established", "related"]

# LAN → WAN (internet access for trusted LAN)
[[firewall.rules]]
name = "lan-internet"
src = "lan"
dest = "wan"
action = "accept"

# Guest → WAN (internet for guests)
[[firewall.rules]]
name = "guest-internet"
src = "guest"
dest = "wan"
action = "accept"

# Guest DNS (accept DNS queries from guest to router)
[[firewall.rules]]
name = "guest-dns"
src = "guest"
proto = "both"
dest_port = 53
action = "accept"

# Guest DHCP
[[firewall.rules]]
name = "guest-dhcp"
src = "guest"
proto = "udp"
dest_port = [67, 68]
action = "accept"

# Guest client isolation (iif == oif drop)
[[firewall.rules]]
name = "guest-isolation"
src = "guest"
dest = "guest"
action = "drop"

# Guest → IoT one-way peer
[[firewall.rules]]
name = "guest-to-iot"
src = "guest"
dest = "iot"
action = "accept"

# IoT DNS
[[firewall.rules]]
name = "iot-dns"
src = "iot"
proto = "both"
dest_port = 53
action = "accept"

# IoT DHCP
[[firewall.rules]]
name = "iot-dhcp"
src = "iot"
proto = "udp"
dest_port = [67, 68]
action = "accept"

# IoT mDNS
[[firewall.rules]]
name = "iot-mdns"
src = "iot"
proto = "udp"
dest_port = 5353
action = "accept"

# IoT NTP
[[firewall.rules]]
name = "iot-ntp"
src = "iot"
proto = "both"
dest_port = 123
action = "accept"

# DNAT: port 53 → DNS service container
[[firewall.rules]]
name = "dns-dnat"
proto = "both"
dest_port = 53
action = "dnat"
dnat_target = "10.53.0.2:15353"

# DNAT: port 123 → NTP service container
[[firewall.rules]]
name = "ntp-dnat"
proto = "both"
dest_port = 123
action = "dnat"
dnat_target = "10.123.0.2:1123"

# Control plane access from LAN
[[firewall.rules]]
name = "control-plane-lan"
src = "lan"
proto = "udp"
dest_port = 51820
action = "accept"

# ICMP ping from LAN
[[firewall.rules]]
name = "lan-ping"
src = "lan"
proto = "icmp"
action = "accept"

# ── Time-based schedules ──
# Any [[firewall.rules]] entry can carry an optional `schedule`
# field. The rule only matches packets during the declared
# window — nft's `meta day` + `meta hour` predicates enforce it
# in-kernel (no userspace timer).
#
# Accepted forms (case-insensitive, whitespace-tolerant):
#   "daily 22:00-06:00"        nightly, every day
#   "weekdays 22:00-06:00"     mon-fri nightly
#   "weekends"                 sat+sun, all day (no hour filter)
#   "mon-fri 09:00-17:00"      office hours
#   "sat,sun 10:00-14:00"      explicit comma-separated day list
#   "22:00-06:00"              daily window, day list omitted
#   "mon-fri"                  weekdays, all day
# Windows that cross midnight (start > end) work natively.
#
# Scheduled rules render as nft text alongside raw_nft (below) —
# unscheduled rules stay on the rustables path, so only the
# window-limited ones pay the text-render cost. DNAT + schedule
# is not supported in v1.
#
# Example: drop streaming video on the IoT zone after 10pm on
# school nights:
#
# [[firewall.rules]]
# name = "iot-bedtime"
# src = "iot"
# dest = "wan"
# proto = "tcp"
# dest_port = [80, 443, 1935]        # http/https/rtmp
# action = "drop"
# schedule = "sun-thu 22:00-06:00"

# ── Advanced rule primitives ──
# Any rule using these fields (src_ip, dest_ip, src_mac, src_port,
# icmp_type, family, limit, log) renders via the nft-text path
# instead of the rustables batch — same chain placement, same
# semantics, richer matching vocabulary. Basic rules (zone +
# proto + dport + ct_state) stay on the fast path.
#
# `enabled = false` leaves a rule around for documentation or
# future re-enable without emitting anything. The reload
# validator still checks its zone refs — typos trip at reload,
# not at re-enable time.
#
# Source / destination IP match. v4 and v6 CIDRs are accepted
# and auto-split: a mixed list emits `ip saddr { ... }` + `ip6
# saddr { ... }` under one rule. `family` pins a rule to one
# family; leave default `any` for dual-stack.
#
# [[firewall.rules]]
# name = "allow-mgmt-ssh"
# src = "lan"
# src_ip = ["192.168.50.10/32", "192.168.50.11/32"]
# proto = "tcp"
# dest_port = 22
# action = "accept"
#
# [[firewall.rules]]
# name = "block-known-bad"
# src = "wan"
# src_ip = ["203.0.113.0/24", "2001:db8:bad::/48"]
# action = "drop"
# log = "wan-blocked "                  # rate-limit the log line:
# limit = "10/minute"                   #   10 matches per minute max
#
# Source MAC match. Rarely the right tool (MAC spoofing is trivial
# on LAN), but useful for "this exact printer gets a bypass" rules.
#
# [[firewall.rules]]
# name = "printer-bypass"
# src = "iot"
# dest = "lan"
# src_mac = ["aa:bb:cc:dd:ee:ff"]
# action = "accept"
#
# Source port match (by contrast dest_port matches the destination
# port). Pairs with proto. Common use: accept DHCPv6 replies
# from a specific upstream server port.
#
# [[firewall.rules]]
# name = "accept-dhcp-replies"
# src = "wan"
# proto = "udp"
# src_port = 67
# dest_port = 68
# action = "accept"
#
# ICMP type match. Name matches nftables' parser: "echo-request",
# "destination-unreachable", "time-exceeded" (IPv4); "nd-neighbor-
# solicit", "mld-listener-query", "packet-too-big" (IPv6). v6
# names auto-set family="ipv6".
#
# [[firewall.rules]]
# name = "allow-traceroute"
# src = "wan"
# proto = "icmp"
# icmp_type = "time-exceeded"
# action = "accept"
#
# Per-rule rate limit. Accepts "N/second", "/minute", "/hour",
# "/day". When the bucket is empty, the rule DOESN'T match — the
# next rule in the chain gets a chance. Common pattern: rate-
# limit + log the first N, then a trailing drop-all for the rest.
#
# [[firewall.rules]]
# name = "ssh-brute-limit"
# src = "wan"
# proto = "tcp"
# dest_port = 22
# limit = "3/minute"
# log = "ssh-slow "
# action = "accept"
# [[firewall.rules]]
# name = "ssh-brute-drop"
# src = "wan"
# proto = "tcp"
# dest_port = 22
# action = "drop"
#
# IPv6-only restriction. Without `family`, a rule with no
# address carriers applies to both families. `family = "ipv6"`
# emits `meta nfproto ipv6` on the way in.
#
# [[firewall.rules]]
# name = "block-v6-telnet"
# family = "ipv6"
# proto = "tcp"
# dest_port = 23
# action = "drop"
#
# Temporarily parked: keep the rule around, don't emit it.
#
# [[firewall.rules]]
# name = "legacy-pptp"
# enabled = false
# proto = "tcp"
# dest_port = 1723
# action = "accept"

# ── Raw-nft escape hatch ──
# For rules the zone/rule abstraction can't express (rate limits,
# custom hook priorities, third-party modules, experimental
# expressions). Each entry is piped through `nft -f -` at the end
# of the firewall install, so the oxwrt-managed tables (`inet
# oxwrt`, `ip oxwrt-nat`, `ip6 oxwrt-nat6`, `inet oxwrt-dnat`)
# are already created by then — you can target them without
# `add table`. Malformed rules are logged and skipped, not fatal.
#
# [[firewall.raw_nft]]
# table = "inet oxwrt"            # default
# chain = "input"
# rule  = "ct state new tcp dport 22 limit rate 5/minute accept"
#
# [[firewall.raw_nft]]
# chain = "forward"
# rule  = "iifname \"br-iot\" oifname \"br-guest\" drop  comment \"no iot→guest\""

# ---------------- Dynamic DNS ----------------
#
# Push the current WAN IP to third-party DDNS providers on lease
# change. Each entry is one (provider, domain, credential) triple;
# the updater polls every 5 minutes and only fires when the IP
# actually changed. Zero entries → feature off.
#
# Providers supported: duckdns, cloudflare, namecheap, dynv6, he
# (Hurricane Electric).
#
# Example (commented — fill in + uncomment to enable):
#
# [[ddns]]
# provider = "duckdns"
# name = "home"
# domain = "myrouter"              # myrouter.duckdns.org
# token = "REDACTED-TOKEN"
#
# [[ddns]]
# provider = "cloudflare"
# name = "cf-home"
# zone_id = "ZZZZZ"
# record_id = "RRRRR"
# domain = "vpn.example.com"       # FQDN of the A record
# api_token = "REDACTED-TOKEN"
# ttl = 60
#
# [[ddns]]
# provider = "namecheap"
# name = "nc-home"
# host = "router"                  # router.example.com
# domain = "example.com"
# password = "PER-HOST-DDNS-KEY"   # from Namecheap dashboard
#
# [[ddns]]
# provider = "dynv6"
# name = "dynv6-home"
# hostname = "myrouter.dynv6.net"
# token = "PER-ZONE-TOKEN"
#
# [[ddns]]                         # Hurricane Electric Free DNS
# provider = "he"
# name = "he-home"
# hostname = "router.example.com"
# key = "DDNS-KEY"                 # from HE.net DNS dashboard

# ---------------- Port Forwards ----------------
#
# External WAN port → internal LAN host:port. Each entry expands at
# install-time into a prerouting DNAT rule + a companion FORWARD
# accept, so a port-forward can't be half-configured (the failure mode
# that made loose `[[firewall.rules]]` action="dnat" rules a footgun).
#
# ── Required ──
#   name           unique identifier
#   proto          "tcp" | "udp" | "both"
#   external_port  u16, port on the source zone's iface
#   internal       "ip:port", destination host and port
#
# ── Optional ──
#   src            source zone, default "wan"
#   dest           dest zone, default auto-detected by matching the
#                  internal IP against LAN/Simple network subnets
#
# Example (commented — uncomment + edit to enable):
#
# [[port_forwards]]
# name = "minecraft"
# proto = "tcp"
# external_port = 25565
# internal = "192.168.50.50:25565"
# src = "wan"                      # default "wan"
# dest = "lan"                     # default auto-detected from internal IP
# reflection = true                # default true — hairpin NAT so a LAN
#                                  # client resolving DDNS → WAN IP still
#                                  # reaches the internal target. Set to
#                                  # false only if double-NAT causes
#                                  # trouble on the same broadcast domain.

# ---------------- Static routes ----------------
#
# Extra IPv4 / IPv6 routes on top of what the kernel installs
# automatically (on-link routes from addresses, default route from
# WAN DHCP or RA). Reconciled on every reload: routes that
# disappear from config get removed from the kernel. Each entry
# is `{ dest, prefix, gateway?, iface, metric }`.
#
# Example (commented):
#
# [[routes]]
# dest = "10.20.0.0"
# prefix = 16
# gateway = "10.8.0.1"              # optional; omit for onlink route
# iface = "wg0"
# metric = 200                      # default 1024

# IPv6 variant. Same shape, different address type — `dest` +
# `gateway` are Ipv6Addr strings; prefix is 0..=128.
#
# [[routes6]]
# dest = "2001:db8::"
# prefix = 32
# gateway = "fe80::1"               # optional; link-local gw ok
# iface = "wg0"
# metric = 200

# ---------------- Blocklists ----------------
#
# IP blocklists: periodically-fetched CIDR lists that drop matching
# source addresses at the INPUT chain. One line per CIDR in the URL
# body (`#` comments + blank lines ok); bare IPs are treated as /32.
# Each list becomes a named nftables set in a dedicated
# `oxwrt-blocklist` table, hooked at priority -10 so matches
# short-circuit before the main oxwrt filter table.
#
# Fetch failures (CDN outage, WAN down at boot) install an empty set
# and log a warning — security posture is temporarily looser, but we
# don't want a download failure to drop all traffic. Refresh cadence
# is per-list; default 24h (86400) matches typical public-list
# update frequency.
#
# Example (commented):
#
# [[blocklists]]
# name = "firehol_level1"
# url = "https://iplists.firehol.org/files/firehol_level1.netset"
# refresh_seconds = 86400
# zones = []                     # empty = router-wide drop

# ---------------- WireGuard ----------------
#
# Each [[wireguard]] entry is one wg interface (e.g. wg0) with a list
# of allowed client peers. Server keys auto-generate on first boot at
# `key_path` (never shipped in the image). Peers are CRUD-managed at
# runtime via `oxctl wg-peer add/update/remove` + `reload`, so the
# on-disk list is often short — it grows as clients enrol.
#
# Firewall: oxwrtd auto-installs an INPUT accept for each
# `listen_port` on the WAN zone; no manual rule needed. Traffic out
# the tunnel is subject to normal zone forwarding (declare the
# wireguard iface as a network if you want it in a zone).
#
# ── Required on [[wireguard]] ──
#   name          String  — CRUD key. Also default iface name.
#   listen_port   u16     — UDP port for inbound handshakes.
#
# ── Optional on [[wireguard]] ──
#   iface         String  — kernel iface; default = name.
#   key_path      String  — default "/etc/oxwrt/wg0.key".
#                           Auto-generated on first boot if missing;
#                           persists across reboots + sysupgrades.
#
# ── Required on [[wireguard.peers]] ──
#   name          String  — CRUD key, operator label.
#   pubkey        String  — base64, 44 chars.
#   allowed_ips   String  — CIDRs, comma-separated.
#
# ── Optional on [[wireguard.peers]] ──
#   preshared_key          String — PSK; adds forward secrecy.
#   endpoint               String — "host:port"; site-to-site only.
#   persistent_keepalive   u16    — seconds; 25 typical for NAT.
#
# Example (commented — uncomment + run `oxctl wg-peer add` to grow):
#
# [[wireguard]]
# name = "wg0"
# listen_port = 51820
# # iface = "wg0"                     # default = name
# # key_path = "/etc/oxwrt/wg0.key"   # default
#
# [[wireguard.peers]]
# name = "laptop"
# pubkey = "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
# allowed_ips = "10.8.0.2/32"
# persistent_keepalive = 25
#
# [[wireguard.peers]]
# name = "site-b"
# pubkey = "BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB="
# preshared_key = "CCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCC="
# allowed_ips = "10.8.0.3/32,192.168.100.0/24"
# endpoint = "site-b.example.com:51820"
# persistent_keepalive = 25

# ---------------- VPN client (outbound WireGuard) ----------------
#
# Each [[vpn_client]] entry is one outbound tunnel to a commercial
# VPN provider (Mullvad, Proton, etc.). Distinct from [[wireguard]]
# above — that's the server side (peers connect IN). Here, the
# router is the client dialing out. AllowedIPs is hardcoded to
# 0.0.0.0/0 (+ ::/0 when `address_v6` is set); any zone with
# `via_vpn = true` routes forwarded traffic through the active
# profile via policy routing (table 51).
#
# Multi-profile: declare several with different `priority` values;
# the coordinator picks the lowest-priority HEALTHY profile as
# the active exit. Probes (ICMP via the wg iface) every 5s with
# 3-fail hysteresis. Kill-switch engages when none are healthy —
# flagged zones lose internet rather than leak out the WAN.
#
# Operator workflow (Mullvad-shaped, other providers similar):
#
#   # 1. Download a .conf from the provider portal (any relay).
#   oxctl <remote> vpn-profile import mullvad-se /path/to/xx.conf
#
#   # 2. Flag which zone(s) should use it.
#   #    Edit [[firewall.zones]] block → `via_vpn = true`.
#   oxctl <remote> reload
#
#   # 3. Switch relays whenever. Key stays the same (Mullvad's
#   #    account-level keypair accepts any of their relays).
#   oxctl <remote> mullvad-relays --country=se
#   oxctl <remote> vpn-switch-relay mullvad-se se-sto-wg-007
#   oxctl <remote> reload
#
# ── Required ──
#   name           String   — CRUD key, unique.
#   iface          String   — kernel netdev, e.g. "wgvpn0".
#   address        String   — tunnel-interior CIDR, e.g. "10.64.0.2/32".
#   probe_target   Ipv4Addr — pinged via the wg iface for health.
#   endpoint       String   — "host:port" of the provider server.
#   public_key     String   — server pubkey (provider-supplied).
#
# ── Optional ──
#   priority                u32    — default 100. Lower = preferred.
#   key_path                String — default /etc/oxwrt/vpn-client.key.
#                                    Provider-issued (Mullvad/Proton
#                                    portal); `vpn-profile import`
#                                    stages it at this path. NOT
#                                    auto-generated — the provider
#                                    must know the matching pubkey.
#   dns                     Vec<Ipv4Addr> — provider DNS, reached via tunnel.
#   mtu                     u32    — default 1420.
#   preshared_key_path      String — base64 PSK file.
#   persistent_keepalive    u16    — default 25s.
#   address_v6              String — IPv6 tunnel CIDR; enables v6
#                                    full-tunnel via parallel
#                                    ip-6 rule + table-51 v6 default.
#   bypass_destinations     Vec<String> — dest CIDRs that skip the
#                                    tunnel even when active. Useful
#                                    for banking / streaming / corp
#                                    VPN that geoblocks commercial
#                                    exits. Rules install at lower
#                                    priority than via_vpn iif so
#                                    dest match wins first.
#   bypass_destinations_v6  Vec<String> — IPv6 counterpart; only
#                                    meaningful with `address_v6`.
#
# Example (commented, Mullvad-shaped):
#
# [[vpn_client]]
# name = "mullvad-se"
# iface = "wgvpn0"
# priority = 100
# key_path = "/etc/oxwrt/vpn/mullvad-se.key"
# address = "10.64.0.2/32"
# dns = ["10.64.0.1"]
# mtu = 1420
# probe_target = "10.64.0.1"
# endpoint = "193.32.127.66:51820"
# public_key = "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
# persistent_keepalive = 25
# # Optional: dest CIDRs that bypass the tunnel even when active —
# # useful for banking / streaming / corp VPN that geoblocks
# # commercial-VPN ranges. Rules install at a lower priority than
# # the via_vpn iif rule, so a dest match wins first.
# # bypass_destinations = ["198.51.100.0/24", "203.0.113.42/32"]
# # Optional IPv6 tunnel-interior address. When set, oxwrtd
# # installs a parallel v6 ip rule + table 51 v6 default so
# # forwarded v6 traffic from via_vpn zones also egresses through
# # the tunnel. Mullvad's .conf hands you a fc00:... /128.
# # address_v6 = "fc00:bbbb:bbbb:bb01::3:185c/128"
#
# [[vpn_client]]
# name = "mullvad-de"
# iface = "wgvpn1"
# priority = 200                     # backup
# key_path = "/etc/oxwrt/vpn/mullvad-de.key"
# address = "10.65.0.2/32"
# dns = ["10.64.0.1"]
# probe_target = "10.64.0.1"
# endpoint = "193.32.127.80:51820"
# public_key = "BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB="
#
# Then flag a zone to route through the active profile — add to
# [[firewall.zones]] where applicable:
#   via_vpn = true     # default false; keeps that zone on WAN.

# ---------------- Radios ----------------
#
# Per-phy radio configuration. Each [[radios]] entry is one physical
# radio (phy0 = 2.4 GHz, phy1 = 5 GHz on MT7976). SSIDs live in [[wifi]]
# below; a single radio can host multiple SSIDs (multi-BSS) via extra
# [[wifi]] entries that reference the same `radio = "phyN"`.
#
# Required fields: phy, band ("2g" or "5g"), channel.
# All other fields are OPTIONAL — leave unset to get sensible band-
# aware defaults from the generator (see oxwrtd/src/wifi.rs).
#
# ── Required ──
#   phy            "phy0" | "phy1"      — kernel-assigned phy name.
#   band           "2g" | "5g"          — drives hw_mode defaults.
#   channel        u16                  — primary 20 MHz channel.
#
# ── Optional ──
#   disabled                  bool      — skip this radio entirely.
#   country_code              String    — ISO 3166-1. Default "US".
#                                         Required for DFS + regulatory.
#   ht_capab                  String    — bracketed, e.g. "[HT40+]...".
#                                         Overrides the band default.
#   vht_capab                 String    — 5 GHz VHT caps.
#   vht_oper_chwidth          u8 (0-3)  — 0=20/40, 1=80, 2=160, 3=80+80.
#                                         Default 1 on 5 GHz.
#   vht_oper_centr_freq_seg0_idx u16    — VHT center ch. Auto-derived.
#   he_oper_chwidth           u8        — Wi-Fi 6. Default = vht.
#   he_oper_centr_freq_seg0_idx u16     — HE center. Default = vht.
#   ieee80211n/ac/ax          bool      — standards toggles. Defaults:
#                                         n=true; ac=true on 5g only;
#                                         ax=true on both.
#   ieee80211d                bool      — regdomain. Default on.
#   ieee80211h                bool      — DFS/TPC. Default on.
#   beacon_int                u16       — TU. Hostapd default 100.
#   dtim_period               u16       — beacons. Hostapd default 2.
#   extra                     [String]  — raw hostapd.conf lines appended
#                                         to the phy section. Escape
#                                         hatch for options not above.

[[radios]]
phy = "phy0"
band = "2g"
channel = 6
country_code = "US"

[[radios]]
phy = "phy1"
band = "5g"
country_code = "US"
# Channel 36 @ 80 MHz (U-NII-1, channels 36-48). Zero DFS, so
# hostapd beacons immediately on boot — no 60-second CAC wait.
# VHT80 / HE80 defaults fall out of wifi.rs's `vht_seg0(36) == 42`
# lookup, so we don't need to restate chwidth/seg0 here.
#
# For VHT160 throughput, either:
#   (a) accept DFS CAC on channel 36 + vht_oper_chwidth=2 + seg0=50
#       (often fails on MT76 — driver doesn't always signal
#       CAC-COMPLETE back to hostapd on MT7986), or
#   (b) switch to channel=149 + vht_oper_chwidth=2 + seg0=155
#       (U-NII-3, no DFS) — regulatory-domain-dependent.
channel = 36

# ── Full-featured radio example (commented) ──
# [[radios]]
# phy = "phy1"
# band = "5g"
# channel = 149
# disabled = false
# country_code = "US"
# vht_oper_chwidth = 2                     # VHT160
# vht_oper_centr_freq_seg0_idx = 155
# he_oper_chwidth = 2
# he_oper_centr_freq_seg0_idx = 155
# vht_capab = "[SHORT-GI-80][SHORT-GI-160][TX-STBC-2BY1][RX-STBC-1]"
# ht_capab = "[HT40+][SHORT-GI-40][TX-STBC][RX-STBC1][MAX-AMSDU-7935]"
# ieee80211n = true
# ieee80211ac = true
# ieee80211ax = true
# ieee80211d = true
# ieee80211h = true
# beacon_int = 100
# dtim_period = 2
# extra = [
#   "obss_interval=300",
#   "local_pwr_constraint=3",
# ]


# ---------------- WiFi (SSIDs / BSSes) ----------------
#
# Each [[wifi]] is one SSID/VAP on a radio. Multiple [[wifi]] entries
# referencing the same `radio = "phyN"` turn into a multi-BSS hostapd
# config — one process per radio serving all its SSIDs. Each BSS can
# have its own bridge (network), security, passphrase, caps, etc.
#
# The first [[wifi]] per radio is the primary BSS (phyN-ap0); the rest
# become phyN-ap1, phyN-ap2, ... hostapd creates those child netdevs
# via nl80211 automatically. MT7976 supports up to 16 VAPs per radio.
#
# Change via `oxwrtd wifi update <ssid> '{...}'` + `oxwrtd reload`
# to rotate an SSID or PSK without reflashing. Add a new SSID with
# `oxwrtd wifi add '{...}'` + reload — the radio's hostapd picks up
# the new BSS on restart.
#
# ── Required ──
#   radio         String       — matches a [[radios]] phy.
#   ssid          String       — 1-32 chars.
#   network       String       — which [[networks]] entry this BSS
#                                 joins (e.g. "lan").
#
# ── Optional ──
#   security      "open" | "wpa2" | "wpa3-sae" | "wpa2-wpa3"
#                              — default "wpa3-sae".
#   passphrase    String       — 8-63 chars. Required unless open.
#   hidden        bool         — suppress SSID in beacons.
#   bridge        String       — override the bridge this BSS joins.
#                                 Default "br-lan". Use for guest/iot
#                                 isolation on a separate L2 segment.
#   wpa_key_mgmt  String       — e.g. "SAE FT-SAE". Overrides default.
#   rsn_pairwise  String       — default "CCMP".
#   ieee80211w    u8 (0|1|2)   — MFP/802.11w. Default: 1 (WPA2), 2 (SAE).
#   sae_require_mfp bool       — default true for SAE.
#   sae_pwe       u8 (0|1|2)   — SAE PWE method.
#   macaddr_acl   u8 (0|1|2)   — 0=open, 1=allow, 2=deny.
#   auth_algs     u8           — bitmask. 1=open, 2=shared, 3=both.
#   ap_isolate    bool         — wireless client isolation. Default false.
#   max_num_sta   u16          — cap associated clients.
#   wmm_enabled   bool         — QoS/WMM. Hostapd default true.
#   ft_over_ds    bool         — 802.11r Fast BSS Transition.
#   extra         [String]     — raw hostapd.conf lines appended to
#                                 this BSS. Escape hatch.

[[wifi]]
radio = "phy1"
ssid = "oxwrt"
security = "wpa2"
# passphrase lives in oxwrt.secrets.toml (keyed by ssid).
network = "lan"

[[wifi]]
radio = "phy0"
ssid = "oxwrt-2g"
security = "wpa2"
# passphrase lives in oxwrt.secrets.toml (keyed by ssid).
network = "lan"

# ── Passphrase auto-rotation ──
# Set `rotate_hours = N` on a [[wifi]] entry to auto-regenerate
# a new 16-char alphanumeric passphrase every N hours. oxwrtd
# rewrites oxwrt.toml atomically, writes operator-facing
# sidecars at /etc/oxwrt/wifi-<ssid>-{passphrase,qr}.txt, and
# logs a "run `oxctl reload`" hint. Typical pattern: guest-only
# SSID rotating daily so handed-out QRs auto-expire. Keep main-
# LAN SSIDs un-rotated so pinned clients don't re-prompt.
#
# [[wifi]]
# radio = "phy0"
# ssid = "guest-day"
# security = "wpa2"
# passphrase = "replace-at-first-boot"
# network = "guest"
# rotate_hours = 24

# ── Multi-BSS example (commented) ──
# Three SSIDs on the 5 GHz radio:
#   "home"  — trusted LAN, WPA3 only, 802.11r roaming
#   "guest" — isolated on br-guest, WPA2 transition, capped at 16 clients
#   "iot"   — hidden, separate bridge, lower QoS via `extra`
#
# [[wifi]]
# radio = "phy1"
# ssid = "home"
# security = "wpa3-sae"
# passphrase = "home-password"
# network = "lan"
# ieee80211w = 2
# ft_over_ds = true
# extra = ["rrm_neighbor_report=1", "rrm_beacon_report=1"]
#
# [[wifi]]
# radio = "phy1"
# ssid = "guest"
# security = "wpa2-wpa3"
# passphrase = "guest-password"
# network = "guest"
# bridge = "br-guest"
# ap_isolate = true
# max_num_sta = 16
#
# [[wifi]]
# radio = "phy1"
# ssid = "iot"
# security = "wpa2"
# passphrase = "iot-password"
# network = "iot"
# bridge = "br-iot"
# hidden = true
# extra = [
#   "wmm_ac_be_aifs=3",
#   "multi_ap_profile=1",
# ]
#
# ── Full-featured single BSS example (commented) ──
# Every typed option spelled out. Copy + prune.
#
# [[wifi]]
# radio = "phy1"
# ssid = "example"
# security = "wpa2-wpa3"
# passphrase = "correct-horse-battery-staple"
# network = "lan"
# hidden = false
# bridge = "br-lan"
# wpa_key_mgmt = "WPA-PSK SAE"
# rsn_pairwise = "CCMP"
# ieee80211w = 1
# sae_require_mfp = false
# sae_pwe = 2
# macaddr_acl = 0
# auth_algs = 1
# ap_isolate = false
# max_num_sta = 128
# wmm_enabled = true
# ft_over_ds = true
# extra = [
#   "rrm_neighbor_report=1",
#   "rrm_beacon_report=1",
# ]

# ---------------- Services ----------------
#
# Each [[services]] is one statically-linked Rust or Go binary running
# in its own mount/net/cgroup namespace. `rootfs` is a directory of
# exactly one binary + whatever /etc/passwd bits it needs. Configuration
# comes from env vars (preferred) or read-only bind mounts — see the
# "Service configuration convention" in project memory.

# --- hickory-dns: forwarding resolver + local cache ---
[[services]]
name = "dns"
rootfs = "/usr/lib/oxwrt/services/dns/rootfs"
entrypoint = ["/hickory-dns", "-c", "/etc/named.toml"]
net_mode = "isolated"
veth = { host_ip = "10.53.0.1", peer_ip = "10.53.0.2", prefix = 30 }
memory_max = 134217728       # 128 MiB — quic-ring + rustls bumps hickory's working set above the 64 MiB we had for plain-UDP upstreams. OOM-kills at 64 under DoQ load.
cpu_max = "50000 100000"     # 50% of one CPU
pids_max = 32
depends_on = []
env = { RUST_LOG = "info" }

[[services.binds]]
# Daemon-generated from the [dns] section below. If that section is
# omitted, oxwrtd writes nothing here and the image's fallback file
# (mounted at /usr/lib/oxwrt/services/dns/named.toml) is what hickory
# would read — but that fallback isn't bound here, so the service
# would fail to start without [dns]. Keep them paired.
source = "/etc/oxwrt/named.toml"
target = "/etc/named.toml"
# readonly = true  # default

# TLS trust store for DoH upstreams. rustls-platform-verifier
# (the default in hickory-dns-0.25 when `https-ring` is enabled)
# reads from /etc/ssl/certs — which ships via ca-bundle on the
# host rootfs. Bind-mounting it into the container rootfs read-only
# keeps the container footprint tiny while giving rustls a real
# trust store to validate upstream certificates against.
[[services.binds]]
source = "/etc/ssl/certs"
target = "/etc/ssl/certs"

# Hardening defaults are safe for hickory on DoH — the default
# retain list covers bind(53) + privilege drop to `nobody`. The
# one override: pid_namespace = true so a hickory 0-day can't
# see or signal any host process (see SECURITY.md P11).
[services.security]
pid_namespace = true

# --- coredhcp: DHCPv4 server for the LAN + guest subnets ---
[[services]]
name = "dhcp"
rootfs = "/usr/lib/oxwrt/services/dhcp/rootfs"
entrypoint = ["/coredhcp", "-c", "/etc/coredhcp.yml"]
# DHCP servers need raw-ish socket access to read/write the full Ethernet
# frame, which means they live on the host netns.
net_mode = "host"
memory_max = 67108864
pids_max = 32
# coredhcp doesn't actually need DNS at runtime — the old
# depends_on=["dns"] was for hostname logging only, which gated
# dhcp's spawn by 500ms of dns startup unnecessarily. Drop the
# dep so dhcp joins the first spawn wave alongside dns + hostapd
# + corerad, saving ~500ms on boot-to-lease.
depends_on = []

[[services.binds]]
# Daemon-generated from the [dhcp] section below. See [dns] above
# for the same pattern + backward-compat note.
source = "/etc/oxwrt/coredhcp.yml"
target = "/etc/coredhcp.yml"
# readonly = true (default)

[[services.binds]]
source = "/etc/oxwrt/coredhcp/leases.txt"
target = "/var/lib/coredhcp/leases.txt"
readonly = false             # coredhcp needs to write lease state
# Source is /etc/oxwrt/... not /var/lib/oxwrt/... because OpenWrt's /var
# is a symlink to /tmp (tmpfs). Staging files under /var in the squashfs
# overlay clobbers the symlink and breaks procd's ubus chown (see
# Makefile comment in imagebuilder-stage).

# coredhcp needs NET_RAW + NET_ADMIN for its raw sockets on top of the
# default four caps. Landlock's writable-bind-mount rule automatically
# covers /var/lib/coredhcp because of the readonly=false bind above.
# pid_namespace bounds a coredhcp CVE to its own process view — host
# netns is still shared (raw AF_PACKET requires it) but at least the
# compromised service can't enumerate or signal other system services.
[services.security]
caps = [
  "SETUID",
  "SETGID",
  "SETPCAP",
  "NET_BIND_SERVICE",
  "NET_RAW",
  "NET_ADMIN",
]
pid_namespace = true
# no_new_privs = true   # default
# seccomp = true        # default
# landlock = true       # default

# --- hostapd-5g: 5 GHz wifi AP on phy1 ---
#
# One hostapd process per radio (failure isolation: one radio crashing
# doesn't take the other down). Same rootfs, different config + ctrl
# socket dir. Both bridged into br-lan → same DHCP/DNS/RA/firewall for
# every wifi + wired client.
[[services]]
name = "hostapd-5g"
rootfs = "/usr/lib/oxwrt/services/hostapd/rootfs"
entrypoint = ["/sbin/hostapd", "/etc/hostapd-5g.conf"]
net_mode = "host"
memory_max = 67108864
pids_max = 16
depends_on = []

[[services.binds]]
# Generated by oxwrtd wifi::write_all() from [[radios]] + [[wifi]]
# entries. /etc/oxwrt/ is on overlayfs (writable + preserved across
# sysupgrade), so reload-driven CRUD edits take effect on the next
# hostapd restart.
source = "/etc/oxwrt/hostapd/phy1.conf"
target = "/etc/hostapd-5g.conf"

# hostapd's ctrl socket lives on the container's /tmp tmpfs (always
# writable, always ephemeral — matches what the socket actually is).
# The former /etc/oxwrt/hostapd-run/ bind put UNIX domain sockets
# under the sysupgrade.conf-preserved tree, which broke the config-
# backup tar step ("socket can not be archived").

# CAP_NET_RAW: 802.11 raw frame TX/RX via the wireless monitor socket.
# CAP_NET_ADMIN: required by nl80211 — every AP-configuration command
# (NL80211_CMD_SET_CHANNEL, NL80211_CMD_START_AP, NL80211_CMD_NEW_KEY,
# etc.) is gated on CAP_NET_ADMIN in the kernel's cfg80211.c. Can't
# be dropped without the AP failing to start. Both caps audited
# 2026-04-20 as genuinely required.
# pid_namespace bounds a hostapd compromise to its own process
# view — nl80211 is netlink, so PID-ns doesn't affect it.
[services.security]
caps = [
  "SETUID", "SETGID", "SETPCAP",
  "NET_BIND_SERVICE", "NET_ADMIN", "NET_RAW",
]
pid_namespace = true

# --- hostapd-2g: 2.4 GHz wifi AP on phy0 ---
#
# Different SSID ("oxwrt-2g") during bring-up so it's obvious which
# band a client is on. Separate ctrl socket dir to avoid collision with
# the 5 GHz instance.
[[services]]
name = "hostapd-2g"
rootfs = "/usr/lib/oxwrt/services/hostapd/rootfs"
entrypoint = ["/sbin/hostapd", "/etc/hostapd-2g.conf"]
net_mode = "host"
memory_max = 67108864
pids_max = 16
depends_on = []

[[services.binds]]
# Generated — same rationale as hostapd-5g above.
source = "/etc/oxwrt/hostapd/phy0.conf"
target = "/etc/hostapd-2g.conf"

# See hostapd-5g note — ctrl socket lives on container tmpfs /tmp.
# pid_namespace for the same reason as hostapd-5g.

[services.security]
caps = [
  "SETUID", "SETGID", "SETPCAP",
  "NET_BIND_SERVICE", "NET_ADMIN", "NET_RAW",
]
pid_namespace = true

# --- corerad: IPv6 Router Advertisement daemon ---
#
# Sends ICMPv6 RAs on br-lan so clients SLAAC from our ULA /64. Pairs
# with coredhcp (DHCPv4 now, DHCPv6 optional later). Replaces the RA
# half of odhcpd-ipv6only (which we dropped in Stage 5).
#
# net_mode=host: corerad binds a raw ICMPv6 socket on br-lan and reads
# rtnetlink events for link/addr changes. Both require being in the
# host netns.
[[services]]
name = "corerad"
rootfs = "/usr/lib/oxwrt/services/corerad/rootfs"
entrypoint = ["/corerad", "-c", "/etc/corerad.toml"]
net_mode = "host"
memory_max = 33554432
pids_max = 16
depends_on = []

[[services.binds]]
# Source is the oxwrtd-generated config (regenerated from
# [[networks]] ipv6_* fields on every boot + reload). See
# oxwrt-linux/src/corerad.rs::write_config. Bundled fallback at
# /usr/lib/oxwrt/services/corerad/corerad.toml is ignored once the
# generated file exists — first boot lands the generated file
# before corerad starts, so no race.
source = "/etc/oxwrt/corerad.toml"
target = "/etc/corerad.toml"

# corerad needs CAP_NET_RAW for the ICMPv6 raw socket (mandatory).
# CAP_NET_ADMIN was previously retained to let corerad toggle
# /proc/sys/net/ipv6/conf/<if>/accept_ra per-iface, but oxwrtd
# already sets `net.ipv6.conf.all.accept_ra = 2` at boot (see
# net/mod.rs:660), which covers every iface via sysctl inheritance.
# Rtnetlink subscription for link/addr change events uses read-only
# netlink and doesn't require NET_ADMIN. Trimmed on 2026-04-20
# during the services-security audit — fewer caps = smaller blast
# radius of a corerad 0-day. If RAs stop advertising after a bump,
# check whether a new corerad version has started issuing nl commands
# that need NET_ADMIN and restore.
[services.security]
caps = ["SETUID", "SETGID", "SETPCAP", "NET_BIND_SERVICE", "NET_RAW"]
pid_namespace = true

# --- ntpd-rs: NTP client + server ---
[[services]]
name = "ntp"
rootfs = "/usr/lib/oxwrt/services/ntp/rootfs"
entrypoint = ["/ntp-daemon", "-c", "/etc/ntp.toml"]
net_mode = "isolated"
veth = { host_ip = "10.123.0.1", peer_ip = "10.123.0.2", prefix = 30 }
memory_max = 33554432
pids_max = 16
depends_on = ["dns"]         # needs DNS to resolve pool.ntp.org

[[services.binds]]
# Daemon-generated from the [ntp] section below. See [dns] and
# [dhcp] for the same pattern + backward-compat note.
source = "/etc/oxwrt/ntp.toml"
target = "/etc/ntp.toml"

# ntpd-rs that actually steps the clock needs SYS_TIME; the default
# retain list doesn't include it, so override here. pid_namespace
# confines a compromised ntpd-rs to its own process view; clock
# manipulation via SYS_TIME is still possible but no cross-process
# signaling.
[services.security]
caps = ["SETUID", "SETGID", "SETPCAP", "NET_BIND_SERVICE", "SYS_TIME"]
pid_namespace = true

# --- upnpd: UPnP IGD + NAT-PMP daemon (commented, opt-in) ---
#
# miniupnpd serves UPnP / NAT-PMP / PCP to LAN clients so games and
# p2p apps get WAN port mappings on demand. Binary is cross-built
# by `make services-upnpd` (pulls Alpine's aarch64-musl miniupnpd
# 2.3.x) and staged at /usr/lib/oxwrt/services/upnpd/rootfs/.
#
# Requires the `[upnp]` block at the top of this file to be
# uncommented too — that's the source of truth for wan/lan ifaces
# + port range. oxwrtd regenerates /etc/oxwrt/miniupnpd.conf from
# `[upnp]` at boot + every reload.
#
# net_mode=host: miniupnpd receives LAN-side SSDP multicast on
# :1900 and writes nftables rules into `oxwrt-upnpd` — both need
# the host netns. The table is separate from oxwrt-dnat so our
# firewall reloads don't wipe miniupnpd's transient mappings.
#
# [[services]]
# name = "upnpd"
# rootfs = "/usr/lib/oxwrt/services/upnpd/rootfs"
# entrypoint = ["/sbin/miniupnpd", "-f", "/etc/miniupnpd/miniupnpd.conf", "-d"]
# net_mode = "host"
# memory_max = 33554432
# pids_max = 16
# depends_on = []
#
# [[services.binds]]
# source = "/etc/oxwrt/miniupnpd.conf"
# target = "/etc/miniupnpd/miniupnpd.conf"
#
# [services.security]
# caps = ["SETUID", "SETGID", "SETPCAP", "NET_BIND_SERVICE", "NET_ADMIN", "NET_RAW"]

# --- debug-ssh: dropbear escape hatch for bring-up (DISABLED by default) ---
#
# ⚠️  ENABLING THIS SERVICE DISABLES SANDBOXING.
#
# The block below turns off seccomp, landlock, and user_namespace
# because dropbear is a legacy C codebase that hasn't been policy-
# audited against our profiles. A single Dropbear CVE while this
# service is enabled = interactive root on the LAN netns, with
# `NET_BIND_SERVICE / CHOWN / DAC_OVERRIDE / FOWNER / SYS_CHROOT`
# retained. That's a materially weaker posture than every other
# supervised service.
#
# Rules of engagement when enabling:
#   - ONLY on a bench during first-boot bring-up.
#   - Comment back out before the device faces any untrusted
#     network (WAN up, guest Wi-Fi enabled, etc.).
#   - If you need emergency troubleshooting on a production box,
#     enable, use, disable, reload — don't leave it running.
#
# COMMENTED OUT DELIBERATELY. oxwrt's supported management surface is
# the sQUIC control plane (`oxctl`); shipping an always-on SSH daemon
# widens the attack surface for the appliance model and pushes the
# identity-pinning story to a second channel (dropbear host-key
# rotation breaks every pinned client).
#
# Uncomment the block below (including the matching [services.binds]
# and [services.security] tables) if you genuinely need a shell
# during bring-up — e.g. you're iterating on a new service and the
# control plane keeps getting broken before you can fix it. When
# you do:
#
#   - Dropbear listens on :2222 (won't fight stock dropbear on :22
#     if you're still running it side-by-side).
#   - Host keys land at /etc/oxwrt/debug-ssh-keys/ (persisted across
#     sysupgrade via the keeplist).
#   - Turn it off again by re-commenting + `oxctl reload` — the
#     supervisor stops the container.
#
# Production images should leave this commented.
#
# [[services]]
# name = "debug-ssh"
# rootfs = "/usr/lib/oxwrt/services/debug-ssh/rootfs"
# entrypoint = ["/sbin/dropbear", "-F", "-E", "-R", "-s", "-p", "2222", "-P", "/tmp/dropbear.pid"]
# # `net_mode = host` — dropbear binds on the real LAN bridge. An
# # isolated veth would require exposing port 2222 via DNAT, which is a
# # lot of plumbing for "the operator wants a shell."
# net_mode = "host"
# pids_max = 64
# depends_on = []
#
# # /dev/pts must be bind-mounted writable so dropbear can allocate
# # pseudo-ttys for interactive sessions (ptmx + /dev/pts/N). Everything
# # else in the rootfs is read-only by default.
# [[services.binds]]
# source = "/dev/pts"
# target = "/dev/pts"
# readonly = false
#
# # Host keys at /etc/dropbear/ must be writable (dropbear `-R` auto-
# # generates ed25519/rsa on first start if missing) AND persist across
# # reboots / sysupgrade (clients pin the host key, regen would break
# # every pinned client). Bind-mount a dir under /etc/oxwrt/ — that
# # path is on the overlay and preserved by sysupgrade.conf.
# [[services.binds]]
# source = "/etc/oxwrt/debug-ssh-keys"
# target = "/etc/dropbear"
# readonly = false
#
# # Dropbear is a legacy C codebase that needs more caps than the
# # default four: CHOWN/DAC_OVERRIDE/FOWNER for pty ownership transfer
# # to the logged-in user, SETUID/SETGID/SETPCAP to drop privilege
# # to that user, SYS_CHROOT for the user-session chroot,
# # NET_BIND_SERVICE just in case the port changes below 1024.
# # Seccomp and landlock off — adds weeks of policy-authoring work
# # for a service that only runs during bring-up. Tighten later.
# #
# # CAP_KILL was dropped 2026-04-20 during live audit: combined with
# # the shared host PID namespace (SECURITY.md "Known — supervised
# # services share the host PID namespace"), KILL would let a
# # compromised dropbear SIGKILL oxwrtd or any sibling service.
# # Dropbear only needs KILL to signal processes it doesn't own —
# # our single-user bench setup (root logs in via pinned key) never
# # hits that path.
# [services.security]
# caps = ["SETUID", "SETGID", "SETPCAP", "NET_BIND_SERVICE", "CHOWN", "DAC_OVERRIDE", "FOWNER", "SYS_CHROOT"]
# no_new_privs = true
# seccomp = false
# seccomp_allow = []
# user_namespace = false
# # pid_namespace on (2026-04-20) so a dropbear CVE can't see or
# # signal oxwrtd or any sibling service. Closes SECURITY.md
# # "Known — supervised services share the host PID namespace"
# # for this specific service. Routes spawn through the clone3
# # path without the userns uid-map dance (container still runs
# # as host-root inside its PID ns).
# pid_namespace = true
# landlock = false

# ---------------- UPnP / NAT-PMP ----------------
#
# Enables miniupnpd: LAN clients (game consoles, p2p apps, etc.)
# request transient WAN port mappings without the operator
# pre-declaring [[port_forwards]]. The daemon installs its own
# DNAT rules into a dedicated `oxwrt-upnpd` nftables table so its
# transient mappings never collide with static forwards.
#
# Scaffolding is in place — `make services-upnpd` cross-builds
# miniupnpd from Alpine, the oxwrt-linux renderer generates
# /etc/oxwrt/miniupnpd.conf, and UUID persists at
# /etc/oxwrt/miniupnpd.uuid. BUT Alpine ships miniupnpd with the
# iptables backend only, which doesn't compose with our pure-
# nftables firewall. Enabling the service today fails with
# "invalid option ... upnp_nftables_family=inet".
#
# To ship: swap the `services-upnpd` target to a from-source build
# configured with `--firewall=nftables` against libnftnl. Tracked
# follow-up; the schema + [[services]] template below are ready
# to flip the moment the binary is.
#
# [upnp]
# wan = "eth1"                    # WAN iface (outside)
# lan = "br-lan"                  # LAN iface (inside)
# min_port = 1024                 # smallest port clients may map
# max_port = 65535                # largest port clients may map
# enable_natpmp = true            # Apple's pre-PCP protocol

# ---------------- Metrics ----------------
#
# Optional Prometheus-format /metrics endpoint. Plain HTTP, no auth —
# bind to the LAN IP and rely on firewall zone rules to keep it off
# WAN. Comment out to disable. idempotent across reload: toggling
# this on/off or changing the listen addr takes effect on the next
# `oxctl reload` without a reboot.
#
# Metrics exported today:
#   oxwrt_supervisor_uptime_seconds
#   oxwrt_service_{state,restarts_total,uptime_seconds,
#                  memory_bytes,memory_peak_bytes,
#                  cpu_{user,system}_seconds_total,pids}
#   oxwrt_ap_up{ssid,iface,phy,band}
#   oxwrt_wan_lease_seconds, oxwrt_wan_dhcp_acquires_total,
#     oxwrt_wan_dhcp_last_acquire_seconds
#   oxwrt_reloads_total, oxwrt_reload_last_duration_seconds
#   oxwrt_firewall_rules
#   oxwrt_blocklist_{entries,fetches_total,last_fetch_timestamp}
#   oxwrt_wg_peer_{last_handshake_seconds,rx_bytes_total,tx_bytes_total}
#   oxwrt_vpn_{active,healthy}{profile,iface}  — per-vpn_client profile
#
[metrics]
listen = "192.168.50.1:9100"

# ---------------- DNS (hickory-dns) ----------------
#
# Forwarding resolver for the router + LAN clients. Rendered by
# oxwrtd into /etc/oxwrt/named.toml; the dns service bind-mounts
# that file at /etc/named.toml. Every knob here is TOML-driven —
# switching from Cloudflare to NextDNS is an edit + reload, no
# service-config file surgery.
#
# listen_port is what the service binds internally; operator-facing
# DNS is :53 via DNAT rules the firewall installs on every zone
# that wants router-local resolution. An unprivileged port here
# means the container doesn't need CAP_NET_BIND_SERVICE.
#
# upstreams: each entry carries `ip` + `protocol` + provider-
# specific bits (`server_name` for TLS SNI, `path` for DoH). Omit
# `port` to take the protocol default (443 https, 853 quic/tls).
# Order matters: hickory round-robins top-to-bottom across healthy
# upstreams, so put the preferred resolver first.

[dns]
listen_v4 = ["0.0.0.0"]
listen_port = 15353

[[dns.upstreams]]
ip = "1.1.1.1"
protocol = "https"
server_name = "cloudflare-dns.com"
path = "/dns-query"

[[dns.upstreams]]
ip = "9.9.9.9"
protocol = "https"
server_name = "dns.quad9.net"
path = "/dns-query"

# ---------------- DHCP (coredhcp) ----------------
#
# Hands out DHCPv4 leases on a LAN/Simple network. Rendered by
# oxwrtd into /etc/oxwrt/coredhcp.yml; the dhcp service bind-mounts
# that file at /etc/coredhcp.yml. Lease state lives separately at
# /etc/oxwrt/coredhcp/leases.txt (bind-mounted too) — that's runtime
# state, not config.
#
# Pool bounds default to .100–.250 of the network (explicit override
# via pool_start / pool_end if you want a different range). DNS
# defaults to [network.address] — the router itself. Gateway
# defaults to the same.

[dhcp]
network = "lan"
lease_time = "12h"
# pool_start = "192.168.50.100"    # defaults to .100 of the network
# pool_end   = "192.168.50.250"    # defaults to .250
# dns_servers = ["192.168.50.1"]   # defaults to [network.address]
# gateway     = "192.168.50.1"     # defaults to network.address

# ---------------- NTP (ntpd-rs) ----------------
#
# Syncs the router's clock + optionally serves LAN clients.
# Rendered by oxwrtd into /etc/oxwrt/ntp.toml; the ntp service
# bind-mounts that file at /etc/ntp.toml.
#
# poll_min / poll_max are log₂ seconds (ntpd-rs convention).
# 4 = 2^4 = 16s minimum poll; 10 = 2^10 = 1024s (~17m) max.
# listen on :1123 because the service runs unprivileged; firewall
# DNATs :123 → :1123 on via-router zones.

[ntp]
poll_min = 4
poll_max = 10
listen = ["0.0.0.0:1123"]

[[ntp.sources]]
mode = "pool"
address = "pool.ntp.org"
count = 4

# ---------------- Off-router config backup (SFTP) ----------------
#
# When set, oxwrtd spawns a tokio task that every interval_hours
# builds the same in-memory tarball `oxctl backup` returns (all
# of /etc/oxwrt/* except vpn/ private keys, plus /etc/oxwrt.toml)
# and streams it over SSH to a remote host. Uses the system `ssh`
# binary (OpenSSH or dropbear's dbclient). Older backups past
# `keep` are pruned after each successful push.
#
# Prerequisites:
#   - ed25519 keypair on the router at key_path (0600 perms).
#     Generate with `dropbearkey -t ed25519 -f /etc/oxwrt/backup.key`
#     and add the pubkey to the remote's ~/.ssh/authorized_keys.
#   - Server host key via inline `host_key` (recommended) OR the
#     legacy `/etc/oxwrt/known_hosts` file (backward compat). The
#     inline form is a standard ssh-keyscan line with the hostname
#     column stripped. Strict host-key checking is ON; unset
#     host_key AND unseeded known_hosts will refuse to connect.
#
# Example (commented):
#
# [backup_sftp]
# host = "backup.example.com"
# port = 22
# username = "oxwrt-backup"
# key_path = "/etc/oxwrt/backup.key"
# remote_dir = "/home/oxwrt-backup/snapshots"
# interval_hours = 24
# keep = 30
# # `ssh-keyscan -t ed25519 backup.example.com` emits
# #   "backup.example.com ssh-ed25519 AAAA…"
# # copy the portion AFTER the hostname into host_key:
# host_key = "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAILzFakeButPlausible…"
# # include_secrets (default true) — whether oxwrt.secrets.toml
# # rides along in the archive. Set to false for off-router
# # backups that compliance wants credential-free (Wi-Fi pass-
# # phrases, DDNS tokens, etc. stay on-box; restoring the
# # resulting archive onto a fresh flash will need the operator
# # to re-paste secrets). Defaults to true because the typical
# # DR scenario needs them.
# include_secrets = true

# ---------------- Control plane ----------------
#
# Listen on [::1]:51820 (loopback) AND on the LAN bridge IP so the
# operator can reach it from their laptop without ssh. Adding a
# network's router IP (e.g. "10.99.0.1:51820") would also work
# if `allow_control_plane = true` on that zone.
#
# The daemon's server-side signing seed (identity, NOT config) is
# at /etc/oxwrt/key.ed25519 — auto-generated on first boot. Derive
# the server pubkey clients should pin with:
#   oxctl --print-server-key
# (or read it out of the boot log — the daemon emits it at startup).

[control]
listen = ["[::1]:51820", "192.168.50.1:51820"]
# Legacy flat-file ACL. Hand-edited on older installs; new setups
# prefer the inline `[[control.clients]]` entries below, which make
# the ACL part of the TOML (backups cover it, oxctl config-push
# round-trips it, `oxctl get control.clients` lists it). Both
# sources are merged and deduplicated — setting one OR both works.
authorized_keys = "/etc/oxwrt/authorized_keys"
# Concurrency / rate caps (SECURITY.md P10).
#
# max_connections — cap on concurrent sQUIC connections per
#   listener. Surplus connections are refused at the handshake
#   (no task spawned), so a WAN scan can't exhaust per-connection
#   state. Apply per listen addr: two listeners × 32 = 64 total.
#   Tune down for a single-operator fleet; CLI opens one
#   connection per RPC and a healthy operator rarely stacks more
#   than a handful.
#
# max_rpcs_per_sec — per-connection token bucket (cap = 2× rate,
#   refills at `rate` tokens/sec). An authenticated client that
#   tries to hammer RPCs on a held connection gets backpressured
#   — acquire sleeps rather than erroring, so a legitimate caller
#   sees latency instead of a failure. Leave at 20 unless a
#   dashboard or monitoring agent needs more.
max_connections = 32
max_rpcs_per_sec = 20

# Inline ACL. `key` is 64 hex chars = 32-byte ed25519 pubkey, as
# printed by the client's `oxctl --print-server-key` against its
# OWN signing seed (SQUIC_CLIENT_KEY on the client side).
#
# [[control.clients]]
# name = "laptop-c"
# key = "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2"
#
# [[control.clients]]
# name = "ci-runner"
# key = "0102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f20"
