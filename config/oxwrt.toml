# oxwrt example configuration.
#
# This file is parsed by `config::Config` (crates/oxwrt-api/src/config.rs)
# and ships at /etc/oxwrt/oxwrt.toml. Every knob the firmware supports
# today appears somewhere below — use it as a cookbook. Fields with
# defaults can be omitted; commented-out lines show the default value
# where relevant.
#
# A matching parse test (`config::tests::example_config_parses`) loads
# this file at `cargo test` time, so any schema change that breaks the
# example also breaks the build — forces both to stay in sync.
#
# Section index:
#   networks       WAN + LAN + Simple (guest/iot/VLAN); multi-WAN
#                  failover via priority/probe_target
#   firewall       zones + explicit rules (no magic booleans)
#   ddns           DuckDNS + Cloudflare
#   port_forwards  external WAN port → internal host:port
#   routes         static IPv4 routes
#   routes6        static IPv6 routes
#   blocklists     banip-style periodic CIDR drop sets
#   wireguard      roadwarrior + site-to-site tunnels (server side)
#   vpn_client     outbound WG tunnels to commercial VPN providers
#                  (full-tunnel v4+v6, killswitch, multi-profile
#                  failover, per-zone opt-in via `via_vpn`, dest
#                  bypass CIDRs, Mullvad API relay picker)
#   radios         per-phy wifi config
#   wifi           per-SSID wifi config (multi-BSS capable)
#   services       containerized services (dns, dhcp, hostapd, …)
#   upnp           miniupnpd renderer (iptables binary staged;
#                  nftables source-build pending)
#   metrics        Prometheus /metrics endpoint
#   control        sQUIC control-plane listen addrs + authorized keys

hostname = "flint2"
timezone = "Europe/Berlin"

# ---------------- Networks ----------------
#
# All networks in one unified array. The `type` tag picks the variant:
# "wan", "lan", or "simple". Firewall policy lives in [[firewall.zones]].

# --- WAN ---
# `mode` picks between "dhcp", "static", and "pppoe". This example uses
# dhcp (the GL.iNet default); swap the fields for one of the alternatives
# below when you need a static IP or a PPPoE link.

[[networks]]
name = "wan"
type = "wan"
iface = "eth1"
mode = "dhcp"
# Failover priority for multi-WAN deployments. Lower = higher
# preference (iproute2 convention). The failover coordinator
# picks the lowest-priority healthy WAN as the active egress
# and mirrors its lease into the default route + DDNS. Single-
# WAN setups can leave this at the default 100.
# priority = 100
#
# Optional active health-check target: when set, oxwrtd pings
# this address through the WAN's iface every 5s. Three fails
# in a row flip the WAN to unhealthy, triggering failover even
# if the DHCP lease is still "valid." Covers the "carrier +
# lease fine but ISP upstream is dead" case that pure lease-
# state health misses. Omit to use lease-state alone.
# probe_target = "1.1.1.1"
#
# Request a DHCPv6 prefix delegation (IA_PD) from the ISP in
# parallel with the IPv4 lease. The delegated prefix is sliced
# into per-subnet /64s via each network's `ipv6_subnet_id`. Set
# to true once your ISP supports IPv6 PD.
# ipv6_pd = true
# SQM / CAKE for bufferbloat control. Uncomment + set to your
# actual measured speeds × 0.9 (leaving 10% headroom prevents
# the ISP's own queue from filling). kbit/s units. Without
# `sqm`, the iface uses pfifo_fast and can bufferbloat under
# load. See crates/oxwrt-linux/src/sqm.rs for impl.
#
# sqm = { bandwidth_up_kbps = 18000, bandwidth_down_kbps = 180000 }
#
# Extra CAKE args (optional): "docsis" for cable, "ethernet"
# for most home WAN, "ptm" for VDSL. "nat" enables NAT-aware
# fair-queueing across LAN flows.
#
# sqm = { bandwidth_up_kbps = 18000, bandwidth_down_kbps = 180000, extra_args = "ethernet nat" }

# --- Multi-WAN failover example (commented) ---
#
# Declare a second WAN with a higher `priority` number (lower
# preference). oxwrtd spawns a DHCP client per WAN in parallel;
# the failover coordinator picks the lowest-priority healthy
# one every 2 seconds and swaps the default route + SNAT
# accordingly. Add both WAN names to the `wan` firewall zone's
# networks array so rules apply regardless of which is active.
#
# [[networks]]
# name = "wan-backup"
# type = "wan"
# iface = "eth2"              # e.g. LTE modem, second ISP port
# mode = "dhcp"
# priority = 200              # higher number = lower preference
# probe_target = "8.8.8.8"    # independent probe target

# [[networks]]                         # alternative: static IPv4 on eth1
# name = "wan"
# type = "wan"
# iface = "eth1"
# mode = "static"
# address = "203.0.113.42"
# prefix = 24
# gateway = "203.0.113.1"
# dns = ["1.1.1.1", "9.9.9.9"]

# [[networks]]                         # alternative: PPPoE
# name = "wan"
# type = "wan"
# iface = "eth1"
# mode = "pppoe"
# username = "user@isp"
# password = "secret"

# --- LAN ---

[[networks]]
name = "lan"
type = "lan"
bridge = "br-lan"
members = ["lan1", "lan2", "lan3", "lan4", "lan5"]
# VLAN-aware bridging (802.1Q filtering on br-lan). When true,
# `vlan_ports` assigns per-port VIDs — access ports declare
# pvid (default untagged VID), trunk ports declare tagged VIDs,
# hybrid ports declare both. Without this flag, every member
# port forwards everything untagged and vlan_ports is ignored.
# The dot-notation alternative (e.g. `eth0.10` subifaces in a
# Simple network) is simpler for one-or-two-VLAN setups; turn
# on vlan_filtering here for managed-switch-style trunking.
#
# vlan_filtering = false
#
# vlan_ports = [
#   { iface = "lan4", pvid = 10 },                    # access port VID 10
#   { iface = "lan5", tagged = [1, 10, 20] },         # trunk: mgmt + 10 + 20
#   { iface = "lan3", pvid = 1, tagged = [10] },      # hybrid: default + VID 10 tagged
# ]
address = "192.168.50.1"
prefix = 24
# IPv6 ULA (fd00::/8, RFC 4193). Chosen deterministically rather
# than random so flashes are reproducible — swap to a delegated
# prefix once DHCPv6-PD lands. Paired with an auto-generated
# corerad RA config (see oxwrt-linux/src/corerad.rs).
ipv6_address = "fdbe:cafe::1"
ipv6_prefix = 64
# Subnet id within the DHCPv6-PD delegated prefix. When the WAN has
# `ipv6_pd = true` and the ISP hands over e.g. a /56, this network
# gets a /64 at `<prefix>:0001::/64` with `::1` as the router. Keep
# these unique across all networks — collisions mean address
# conflicts on the PD side. Ignored when `ipv6_pd` is off.
ipv6_subnet_id = 1

# --- Guest ---

[[networks]]
name = "guest"
type = "simple"
iface = "br-guest"
address = "10.99.0.1"
prefix = 24
ipv6_subnet_id = 2
# Optional ULA fallback when DHCPv6-PD isn't available. Without
# ipv6_address, this network is IPv4-only until the PD kicks in.
# ipv6_address = "fdbe:cafe:2::1"
# ipv6_prefix = 64

# --- IoT ---

[[networks]]
name = "iot"
type = "simple"
iface = "br-iot"
address = "10.20.0.1"
prefix = 24
ipv6_subnet_id = 3

# ── VLAN-tagged Simple network example (commented) ──
# 802.1Q sub-iface on top of eth0. oxwrtd creates eth0.10 at boot
# via rtnetlink (InfoKind::Vlan), then assigns 10.10.0.1/24 on it.
# Both `vlan` and `vlan_parent` are required together — validate.rs
# rejects one without the other so a typo doesn't silently produce
# an untagged iface. Pair with a firewall zone to gate traffic.
#
# [[networks]]
# name = "voip"
# type = "simple"
# iface = "eth0.10"
# vlan = 10
# vlan_parent = "eth0"
# address = "10.10.0.1"
# prefix = 24

# ---------------- Firewall ----------------
#
# All firewall policy in one place. Zones declare default chain policies;
# rules declare explicit accepts/drops/DNATs. No boolean shortcuts —
# every firewall behavior is an explicit rule.

[[firewall.zones]]
name = "lan"
networks = ["lan"]
default_input = "accept"
default_forward = "drop"

[[firewall.zones]]
name = "guest"
networks = ["guest"]
default_input = "drop"
default_forward = "drop"

[[firewall.zones]]
name = "wan"
# For multi-WAN deployments, list every WAN network's `name` here
# so rules apply regardless of which link is active right now —
# e.g. `networks = ["wan", "wan-backup"]`. Masquerade then
# installs on each iface in turn.
networks = ["wan"]
default_input = "drop"
default_forward = "drop"
masquerade = true

# Established/related — visible, not hidden in net.rs
[[firewall.rules]]
name = "ct-established"
action = "accept"
ct_state = ["established", "related"]

# LAN → WAN (internet access for trusted LAN)
[[firewall.rules]]
name = "lan-internet"
src = "lan"
dest = "wan"
action = "accept"

# Guest → WAN (internet for guests)
[[firewall.rules]]
name = "guest-internet"
src = "guest"
dest = "wan"
action = "accept"

# Guest DNS (accept DNS queries from guest to router)
[[firewall.rules]]
name = "guest-dns"
src = "guest"
proto = "both"
dest_port = 53
action = "accept"

# Guest DHCP
[[firewall.rules]]
name = "guest-dhcp"
src = "guest"
proto = "udp"
dest_port = [67, 68]
action = "accept"

# Guest client isolation (iif == oif drop)
[[firewall.rules]]
name = "guest-isolation"
src = "guest"
dest = "guest"
action = "drop"

# Guest → IoT one-way peer
[[firewall.rules]]
name = "guest-to-iot"
src = "guest"
dest = "iot"
action = "accept"

# IoT DNS
[[firewall.rules]]
name = "iot-dns"
src = "iot"
proto = "both"
dest_port = 53
action = "accept"

# IoT DHCP
[[firewall.rules]]
name = "iot-dhcp"
src = "iot"
proto = "udp"
dest_port = [67, 68]
action = "accept"

# IoT mDNS
[[firewall.rules]]
name = "iot-mdns"
src = "iot"
proto = "udp"
dest_port = 5353
action = "accept"

# IoT NTP
[[firewall.rules]]
name = "iot-ntp"
src = "iot"
proto = "both"
dest_port = 123
action = "accept"

# DNAT: port 53 → DNS service container
[[firewall.rules]]
name = "dns-dnat"
proto = "both"
dest_port = 53
action = "dnat"
dnat_target = "10.53.0.2:15353"

# DNAT: port 123 → NTP service container
[[firewall.rules]]
name = "ntp-dnat"
proto = "both"
dest_port = 123
action = "dnat"
dnat_target = "10.123.0.2:1123"

# Control plane access from LAN
[[firewall.rules]]
name = "control-plane-lan"
src = "lan"
proto = "udp"
dest_port = 51820
action = "accept"

# ICMP ping from LAN
[[firewall.rules]]
name = "lan-ping"
src = "lan"
proto = "icmp"
action = "accept"

# ---------------- Dynamic DNS ----------------
#
# Push the current WAN IP to third-party DDNS providers on lease
# change. Each entry is one (provider, domain, credential) triple;
# the updater polls every 5 minutes and only fires when the IP
# actually changed. Zero entries → feature off.
#
# Providers supported today: duckdns, cloudflare.
#
# Example (commented — fill in + uncomment to enable):
#
# [[ddns]]
# provider = "duckdns"
# name = "home"
# domain = "myrouter"              # myrouter.duckdns.org
# token = "REDACTED-TOKEN"
#
# [[ddns]]
# provider = "cloudflare"
# name = "cf-home"
# zone_id = "ZZZZZ"
# record_id = "RRRRR"
# domain = "vpn.example.com"       # FQDN of the A record
# api_token = "REDACTED-TOKEN"
# ttl = 60

# ---------------- Port Forwards ----------------
#
# External WAN port → internal LAN host:port. Each entry expands at
# install-time into a prerouting DNAT rule + a companion FORWARD
# accept, so a port-forward can't be half-configured (the failure mode
# that made loose `[[firewall.rules]]` action="dnat" rules a footgun).
#
# ── Required ──
#   name           unique identifier
#   proto          "tcp" | "udp" | "both"
#   external_port  u16, port on the source zone's iface
#   internal       "ip:port", destination host and port
#
# ── Optional ──
#   src            source zone, default "wan"
#   dest           dest zone, default auto-detected by matching the
#                  internal IP against LAN/Simple network subnets
#
# Example (commented — uncomment + edit to enable):
#
# [[port_forwards]]
# name = "minecraft"
# proto = "tcp"
# external_port = 25565
# internal = "192.168.50.50:25565"
# src = "wan"                      # default "wan"
# dest = "lan"                     # default auto-detected from internal IP

# ---------------- Static routes ----------------
#
# Extra IPv4 / IPv6 routes on top of what the kernel installs
# automatically (on-link routes from addresses, default route from
# WAN DHCP or RA). Reconciled on every reload: routes that
# disappear from config get removed from the kernel. Each entry
# is `{ dest, prefix, gateway?, iface, metric }`.
#
# Example (commented):
#
# [[routes]]
# dest = "10.20.0.0"
# prefix = 16
# gateway = "10.8.0.1"              # optional; omit for onlink route
# iface = "wg0"
# metric = 200                      # default 1024

# IPv6 variant. Same shape, different address type — `dest` +
# `gateway` are Ipv6Addr strings; prefix is 0..=128.
#
# [[routes6]]
# dest = "2001:db8::"
# prefix = 32
# gateway = "fe80::1"               # optional; link-local gw ok
# iface = "wg0"
# metric = 200

# ---------------- Blocklists ----------------
#
# IP blocklists: periodically-fetched CIDR lists that drop matching
# source addresses at the INPUT chain. One line per CIDR in the URL
# body (`#` comments + blank lines ok); bare IPs are treated as /32.
# Each list becomes a named nftables set in a dedicated
# `oxwrt-blocklist` table, hooked at priority -10 so matches
# short-circuit before the main oxwrt filter table.
#
# Fetch failures (CDN outage, WAN down at boot) install an empty set
# and log a warning — security posture is temporarily looser, but we
# don't want a download failure to drop all traffic. Refresh cadence
# is per-list; default 24h (86400) matches typical public-list
# update frequency.
#
# Example (commented):
#
# [[blocklists]]
# name = "firehol_level1"
# url = "https://iplists.firehol.org/files/firehol_level1.netset"
# refresh_seconds = 86400
# zones = []                     # empty = router-wide drop

# ---------------- WireGuard ----------------
#
# Each [[wireguard]] entry is one wg interface (e.g. wg0) with a list
# of allowed client peers. Server keys auto-generate on first boot at
# `key_path` (never shipped in the image). Peers are CRUD-managed at
# runtime via `oxctl wg-peer add/update/remove` + `reload`, so the
# on-disk list is often short — it grows as clients enrol.
#
# Firewall: oxwrtd auto-installs an INPUT accept for each
# `listen_port` on the WAN zone; no manual rule needed. Traffic out
# the tunnel is subject to normal zone forwarding (declare the
# wireguard iface as a network if you want it in a zone).
#
# ── Required on [[wireguard]] ──
#   name          String  — CRUD key. Also default iface name.
#   listen_port   u16     — UDP port for inbound handshakes.
#
# ── Optional on [[wireguard]] ──
#   iface         String  — kernel iface; default = name.
#   key_path      String  — default "/etc/oxwrt/wg0.key".
#
# ── Required on [[wireguard.peers]] ──
#   name          String  — CRUD key, operator label.
#   pubkey        String  — base64, 44 chars.
#   allowed_ips   String  — CIDRs, comma-separated.
#
# ── Optional on [[wireguard.peers]] ──
#   preshared_key          String — PSK; adds forward secrecy.
#   endpoint               String — "host:port"; site-to-site only.
#   persistent_keepalive   u16    — seconds; 25 typical for NAT.
#
# Example (commented — uncomment + run `oxctl wg-peer add` to grow):
#
# [[wireguard]]
# name = "wg0"
# listen_port = 51820
# # iface = "wg0"                     # default = name
# # key_path = "/etc/oxwrt/wg0.key"   # default
#
# [[wireguard.peers]]
# name = "laptop"
# pubkey = "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
# allowed_ips = "10.8.0.2/32"
# persistent_keepalive = 25
#
# [[wireguard.peers]]
# name = "site-b"
# pubkey = "BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB="
# preshared_key = "CCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCC="
# allowed_ips = "10.8.0.3/32,192.168.100.0/24"
# endpoint = "site-b.example.com:51820"
# persistent_keepalive = 25

# ---------------- VPN client (outbound WireGuard) ----------------
#
# Each [[vpn_client]] entry is one outbound tunnel to a commercial
# VPN provider (Mullvad, Proton, etc.). Distinct from [[wireguard]]
# above — that's the server side (peers connect IN). Here, the
# router is the client dialing out. AllowedIPs is hardcoded to
# 0.0.0.0/0 (+ ::/0 when `address_v6` is set); any zone with
# `via_vpn = true` routes forwarded traffic through the active
# profile via policy routing (table 51).
#
# Multi-profile: declare several with different `priority` values;
# the coordinator picks the lowest-priority HEALTHY profile as
# the active exit. Probes (ICMP via the wg iface) every 5s with
# 3-fail hysteresis. Kill-switch engages when none are healthy —
# flagged zones lose internet rather than leak out the WAN.
#
# Operator workflow (Mullvad-shaped, other providers similar):
#
#   # 1. Download a .conf from the provider portal (any relay).
#   oxctl <remote> vpn-profile import mullvad-se /path/to/xx.conf
#
#   # 2. Flag which zone(s) should use it.
#   #    Edit [[firewall.zones]] block → `via_vpn = true`.
#   oxctl <remote> reload
#
#   # 3. Switch relays whenever. Key stays the same (Mullvad's
#   #    account-level keypair accepts any of their relays).
#   oxctl <remote> mullvad-relays --country=se
#   oxctl <remote> vpn-switch-relay mullvad-se se-sto-wg-007
#   oxctl <remote> reload
#
# ── Required ──
#   name           String   — CRUD key, unique.
#   iface          String   — kernel netdev, e.g. "wgvpn0".
#   address        String   — tunnel-interior CIDR, e.g. "10.64.0.2/32".
#   probe_target   Ipv4Addr — pinged via the wg iface for health.
#   endpoint       String   — "host:port" of the provider server.
#   public_key     String   — server pubkey (provider-supplied).
#
# ── Optional ──
#   priority                u32    — default 100. Lower = preferred.
#   key_path                String — default /etc/oxwrt/vpn-client.key.
#   dns                     Vec<Ipv4Addr> — provider DNS, reached via tunnel.
#   mtu                     u32    — default 1420.
#   preshared_key_path      String — base64 PSK file.
#   persistent_keepalive    u16    — default 25s.
#   address_v6              String — IPv6 tunnel CIDR; enables v6
#                                    full-tunnel via parallel
#                                    ip-6 rule + table-51 v6 default.
#   bypass_destinations     Vec<String> — dest CIDRs that skip the
#                                    tunnel even when active. Useful
#                                    for banking / streaming / corp
#                                    VPN that geoblocks commercial
#                                    exits. Rules install at lower
#                                    priority than via_vpn iif so
#                                    dest match wins first.
#   bypass_destinations_v6  Vec<String> — IPv6 counterpart; only
#                                    meaningful with `address_v6`.
#
# Example (commented, Mullvad-shaped):
#
# [[vpn_client]]
# name = "mullvad-se"
# iface = "wgvpn0"
# priority = 100
# key_path = "/etc/oxwrt/vpn/mullvad-se.key"
# address = "10.64.0.2/32"
# dns = ["10.64.0.1"]
# mtu = 1420
# probe_target = "10.64.0.1"
# endpoint = "193.32.127.66:51820"
# public_key = "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
# persistent_keepalive = 25
# # Optional: dest CIDRs that bypass the tunnel even when active —
# # useful for banking / streaming / corp VPN that geoblocks
# # commercial-VPN ranges. Rules install at a lower priority than
# # the via_vpn iif rule, so a dest match wins first.
# # bypass_destinations = ["198.51.100.0/24", "203.0.113.42/32"]
# # Optional IPv6 tunnel-interior address. When set, oxwrtd
# # installs a parallel v6 ip rule + table 51 v6 default so
# # forwarded v6 traffic from via_vpn zones also egresses through
# # the tunnel. Mullvad's .conf hands you a fc00:... /128.
# # address_v6 = "fc00:bbbb:bbbb:bb01::3:185c/128"
#
# [[vpn_client]]
# name = "mullvad-de"
# iface = "wgvpn1"
# priority = 200                     # backup
# key_path = "/etc/oxwrt/vpn/mullvad-de.key"
# address = "10.65.0.2/32"
# dns = ["10.64.0.1"]
# probe_target = "10.64.0.1"
# endpoint = "193.32.127.80:51820"
# public_key = "BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB="
#
# Then flag a zone to route through the active profile — add to
# [[firewall.zones]] where applicable:
#   via_vpn = true     # default false; keeps that zone on WAN.

# ---------------- Radios ----------------
#
# Per-phy radio configuration. Each [[radios]] entry is one physical
# radio (phy0 = 2.4 GHz, phy1 = 5 GHz on MT7976). SSIDs live in [[wifi]]
# below; a single radio can host multiple SSIDs (multi-BSS) via extra
# [[wifi]] entries that reference the same `radio = "phyN"`.
#
# Required fields: phy, band ("2g" or "5g"), channel.
# All other fields are OPTIONAL — leave unset to get sensible band-
# aware defaults from the generator (see oxwrtd/src/wifi.rs).
#
# ── Required ──
#   phy            "phy0" | "phy1"      — kernel-assigned phy name.
#   band           "2g" | "5g"          — drives hw_mode defaults.
#   channel        u16                  — primary 20 MHz channel.
#
# ── Optional ──
#   disabled                  bool      — skip this radio entirely.
#   country_code              String    — ISO 3166-1. Default "US".
#                                         Required for DFS + regulatory.
#   ht_capab                  String    — bracketed, e.g. "[HT40+]...".
#                                         Overrides the band default.
#   vht_capab                 String    — 5 GHz VHT caps.
#   vht_oper_chwidth          u8 (0-3)  — 0=20/40, 1=80, 2=160, 3=80+80.
#                                         Default 1 on 5 GHz.
#   vht_oper_centr_freq_seg0_idx u16    — VHT center ch. Auto-derived.
#   he_oper_chwidth           u8        — Wi-Fi 6. Default = vht.
#   he_oper_centr_freq_seg0_idx u16     — HE center. Default = vht.
#   ieee80211n/ac/ax          bool      — standards toggles. Defaults:
#                                         n=true; ac=true on 5g only;
#                                         ax=true on both.
#   ieee80211d                bool      — regdomain. Default on.
#   ieee80211h                bool      — DFS/TPC. Default on.
#   beacon_int                u16       — TU. Hostapd default 100.
#   dtim_period               u16       — beacons. Hostapd default 2.
#   extra                     [String]  — raw hostapd.conf lines appended
#                                         to the phy section. Escape
#                                         hatch for options not above.

[[radios]]
phy = "phy0"
band = "2g"
channel = 6
country_code = "US"

[[radios]]
phy = "phy1"
band = "5g"
country_code = "US"
# Channel 36 @ 80 MHz (U-NII-1, channels 36-48). Zero DFS, so
# hostapd beacons immediately on boot — no 60-second CAC wait.
# VHT80 / HE80 defaults fall out of wifi.rs's `vht_seg0(36) == 42`
# lookup, so we don't need to restate chwidth/seg0 here.
#
# For VHT160 throughput, either:
#   (a) accept DFS CAC on channel 36 + vht_oper_chwidth=2 + seg0=50
#       (often fails on MT76 — driver doesn't always signal
#       CAC-COMPLETE back to hostapd on MT7986), or
#   (b) switch to channel=149 + vht_oper_chwidth=2 + seg0=155
#       (U-NII-3, no DFS) — regulatory-domain-dependent.
channel = 36

# ── Full-featured radio example (commented) ──
# [[radios]]
