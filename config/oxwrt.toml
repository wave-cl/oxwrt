# oxwrt example configuration.
#
# This file is parsed by `config::Config` (oxwrtd/src/config.rs). Every
# knob the firmware supports today appears somewhere below — use it as a
# cookbook. Fields with defaults can be omitted; the commented-out lines
# show the default value where relevant.
#
# A matching parse test (`config::tests::example_config_parses`) loads
# this file at `cargo test` time, so any schema change that breaks the
# example also breaks the build — which forces both to stay in sync.

hostname = "flint2"
timezone = "Europe/Berlin"

# ---------------- Networks ----------------
#
# All networks in one unified array. The `type` tag picks the variant:
# "wan", "lan", or "simple". Firewall policy lives in [[firewall.zones]].

# --- WAN ---
# `mode` picks between "dhcp", "static", and "pppoe". This example uses
# dhcp (the GL.iNet default); swap the fields for one of the alternatives
# below when you need a static IP or a PPPoE link.

[[networks]]
name = "wan"
type = "wan"
iface = "eth1"
mode = "dhcp"
# Request a DHCPv6 prefix delegation (IA_PD) from the ISP in
# parallel with the IPv4 lease. The delegated prefix is sliced
# into per-subnet /64s via each network's `ipv6_subnet_id`. Set
# to true once your ISP supports IPv6 PD.
# ipv6_pd = true
# SQM / CAKE for bufferbloat control. Uncomment + set to your
# actual measured speeds × 0.9 (leaving 10% headroom prevents
# the ISP's own queue from filling). kbit/s units. Without
# `sqm`, the iface uses pfifo_fast and can bufferbloat under
# load. See crates/oxwrt-linux/src/sqm.rs for impl.
#
# sqm = { bandwidth_up_kbps = 18000, bandwidth_down_kbps = 180000 }
#
# Extra CAKE args (optional): "docsis" for cable, "ethernet"
# for most home WAN, "ptm" for VDSL. "nat" enables NAT-aware
# fair-queueing across LAN flows.
#
# sqm = { bandwidth_up_kbps = 18000, bandwidth_down_kbps = 180000, extra_args = "ethernet nat" }

# [[networks]]                         # alternative: static IPv4 on eth1
# name = "wan"
# type = "wan"
# iface = "eth1"
# mode = "static"
# address = "203.0.113.42"
# prefix = 24
# gateway = "203.0.113.1"
# dns = ["1.1.1.1", "9.9.9.9"]

# [[networks]]                         # alternative: PPPoE
# name = "wan"
# type = "wan"
# iface = "eth1"
# mode = "pppoe"
# username = "user@isp"
# password = "secret"

# --- LAN ---

[[networks]]
name = "lan"
type = "lan"
bridge = "br-lan"
members = ["lan1", "lan2", "lan3", "lan4", "lan5"]
address = "192.168.50.1"
prefix = 24
# IPv6 ULA (fd00::/8, RFC 4193). Chosen deterministically rather
# than random so flashes are reproducible — swap to a delegated
# prefix once DHCPv6-PD lands. Paired with an auto-generated
# corerad RA config (see oxwrt-linux/src/corerad.rs).
ipv6_address = "fdbe:cafe::1"
ipv6_prefix = 64
# Subnet id within the DHCPv6-PD delegated prefix. When the WAN has
# `ipv6_pd = true` and the ISP hands over e.g. a /56, this network
# gets a /64 at `<prefix>:0001::/64` with `::1` as the router. Keep
# these unique across all networks — collisions mean address
# conflicts on the PD side. Ignored when `ipv6_pd` is off.
ipv6_subnet_id = 1

# --- Guest ---

[[networks]]
name = "guest"
type = "simple"
iface = "br-guest"
address = "10.99.0.1"
prefix = 24
ipv6_subnet_id = 2
# Optional ULA fallback when DHCPv6-PD isn't available. Without
# ipv6_address, this network is IPv4-only until the PD kicks in.
# ipv6_address = "fdbe:cafe:2::1"
# ipv6_prefix = 64

# --- IoT ---

[[networks]]
name = "iot"
type = "simple"
iface = "br-iot"
address = "10.20.0.1"
prefix = 24
ipv6_subnet_id = 3

# ── VLAN-tagged Simple network example (commented) ──
# 802.1Q sub-iface on top of eth0. oxwrtd creates eth0.10 at boot
# via rtnetlink (InfoKind::Vlan), then assigns 10.10.0.1/24 on it.
# Both `vlan` and `vlan_parent` are required together — validate.rs
# rejects one without the other so a typo doesn't silently produce
# an untagged iface. Pair with a firewall zone to gate traffic.
#
# [[networks]]
# name = "voip"
# type = "simple"
# iface = "eth0.10"
# vlan = 10
# vlan_parent = "eth0"
# address = "10.10.0.1"
# prefix = 24

# ---------------- Firewall ----------------
#
# All firewall policy in one place. Zones declare default chain policies;
# rules declare explicit accepts/drops/DNATs. No boolean shortcuts —
# every firewall behavior is an explicit rule.

[[firewall.zones]]
name = "lan"
networks = ["lan"]
default_input = "accept"
default_forward = "drop"

[[firewall.zones]]
name = "guest"
networks = ["guest"]
default_input = "drop"
default_forward = "drop"

[[firewall.zones]]
name = "wan"
networks = ["wan"]
default_input = "drop"
default_forward = "drop"
masquerade = true

# Established/related — visible, not hidden in net.rs
[[firewall.rules]]
name = "ct-established"
action = "accept"
ct_state = ["established", "related"]

# LAN → WAN (internet access for trusted LAN)
[[firewall.rules]]
name = "lan-internet"
src = "lan"
dest = "wan"
action = "accept"

# Guest → WAN (internet for guests)
[[firewall.rules]]
name = "guest-internet"
src = "guest"
dest = "wan"
action = "accept"

# Guest DNS (accept DNS queries from guest to router)
[[firewall.rules]]
name = "guest-dns"
src = "guest"
proto = "both"
dest_port = 53
action = "accept"

# Guest DHCP
[[firewall.rules]]
name = "guest-dhcp"
src = "guest"
proto = "udp"
dest_port = [67, 68]
action = "accept"

# Guest client isolation (iif == oif drop)
[[firewall.rules]]
name = "guest-isolation"
src = "guest"
dest = "guest"
action = "drop"

# Guest → IoT one-way peer
[[firewall.rules]]
name = "guest-to-iot"
src = "guest"
dest = "iot"
action = "accept"

# IoT DNS
[[firewall.rules]]
name = "iot-dns"
src = "iot"
proto = "both"
dest_port = 53
action = "accept"

# IoT DHCP
[[firewall.rules]]
name = "iot-dhcp"
src = "iot"
proto = "udp"
dest_port = [67, 68]
action = "accept"

# IoT mDNS
[[firewall.rules]]
name = "iot-mdns"
src = "iot"
proto = "udp"
dest_port = 5353
action = "accept"

# IoT NTP
[[firewall.rules]]
name = "iot-ntp"
src = "iot"
proto = "both"
dest_port = 123
action = "accept"

# DNAT: port 53 → DNS service container
[[firewall.rules]]
name = "dns-dnat"
proto = "both"
dest_port = 53
action = "dnat"
dnat_target = "10.53.0.2:15353"

# DNAT: port 123 → NTP service container
[[firewall.rules]]
name = "ntp-dnat"
proto = "both"
dest_port = 123
action = "dnat"
dnat_target = "10.123.0.2:1123"

# Control plane access from LAN
[[firewall.rules]]
name = "control-plane-lan"
src = "lan"
proto = "udp"
dest_port = 51820
action = "accept"

# ICMP ping from LAN
[[firewall.rules]]
name = "lan-ping"
src = "lan"
proto = "icmp"
action = "accept"

# ---------------- Dynamic DNS ----------------
#
# Push the current WAN IP to third-party DDNS providers on lease
# change. Each entry is one (provider, domain, credential) triple;
# the updater polls every 5 minutes and only fires when the IP
# actually changed. Zero entries → feature off.
#
# Providers supported today: duckdns, cloudflare.
#
# Example (commented — fill in + uncomment to enable):
#
# [[ddns]]
# provider = "duckdns"
# name = "home"
# domain = "myrouter"              # myrouter.duckdns.org
# token = "REDACTED-TOKEN"
#
# [[ddns]]
# provider = "cloudflare"
# name = "cf-home"
# zone_id = "ZZZZZ"
# record_id = "RRRRR"
# domain = "vpn.example.com"       # FQDN of the A record
# api_token = "REDACTED-TOKEN"
# ttl = 60

# ---------------- Port Forwards ----------------
#
# External WAN port → internal LAN host:port. Each entry expands at
# install-time into a prerouting DNAT rule + a companion FORWARD
# accept, so a port-forward can't be half-configured (the failure mode
# that made loose `[[firewall.rules]]` action="dnat" rules a footgun).
#
# ── Required ──
#   name           unique identifier
#   proto          "tcp" | "udp" | "both"
#   external_port  u16, port on the source zone's iface
#   internal       "ip:port", destination host and port
#
# ── Optional ──
#   src            source zone, default "wan"
#   dest           dest zone, default auto-detected by matching the
#                  internal IP against LAN/Simple network subnets
#
# Example (commented — uncomment + edit to enable):
#
# [[port_forwards]]
# name = "minecraft"
# proto = "tcp"
# external_port = 25565
# internal = "192.168.50.50:25565"
# src = "wan"                      # default "wan"
# dest = "lan"                     # default auto-detected from internal IP

# ---------------- Static routes ----------------
#
# Extra IPv4 routes on top of what the kernel installs automatically
# (on-link routes from addresses, default route from WAN DHCP). Each
# entry is `{ dest, prefix, gateway?, iface, metric }`. Reconciled on
# every reload: routes that disappear from config get removed from
# the kernel. No IPv6 yet — duplicate pattern coming when needed.
#
# Example (commented):
#
# [[routes]]
# dest = "10.20.0.0"
# prefix = 16
# gateway = "10.8.0.1"              # optional; omit for onlink route
# iface = "wg0"
# metric = 200                      # default 1024

# ---------------- Blocklists ----------------
#
# IP blocklists: periodically-fetched CIDR lists that drop matching
# source addresses at the INPUT chain. One line per CIDR in the URL
# body (`#` comments + blank lines ok); bare IPs are treated as /32.
# Each list becomes a named nftables set in a dedicated
# `oxwrt-blocklist` table, hooked at priority -10 so matches
# short-circuit before the main oxwrt filter table.
#
# Fetch failures (CDN outage, WAN down at boot) install an empty set
# and log a warning — security posture is temporarily looser, but we
# don't want a download failure to drop all traffic. Refresh cadence
# is per-list; default 24h (86400) matches typical public-list
# update frequency.
#
# Example (commented):
#
# [[blocklists]]
# name = "firehol_level1"
# url = "https://iplists.firehol.org/files/firehol_level1.netset"
# refresh_seconds = 86400
# zones = []                     # empty = router-wide drop

# ---------------- WireGuard ----------------
#
# Each [[wireguard]] entry is one wg interface (e.g. wg0) with a list
# of allowed client peers. Server keys auto-generate on first boot at
# `key_path` (never shipped in the image). Peers are CRUD-managed at
# runtime via `oxctl wg-peer add/update/remove` + `reload`, so the
# on-disk list is often short — it grows as clients enrol.
#
# Firewall: oxwrtd auto-installs an INPUT accept for each
# `listen_port` on the WAN zone; no manual rule needed. Traffic out
# the tunnel is subject to normal zone forwarding (declare the
# wireguard iface as a network if you want it in a zone).
#
# ── Required on [[wireguard]] ──
#   name          String  — CRUD key. Also default iface name.
#   listen_port   u16     — UDP port for inbound handshakes.
#
# ── Optional on [[wireguard]] ──
#   iface         String  — kernel iface; default = name.
#   key_path      String  — default "/etc/oxwrt/wg0.key".
#
# ── Required on [[wireguard.peers]] ──
#   name          String  — CRUD key, operator label.
#   pubkey        String  — base64, 44 chars.
#   allowed_ips   String  — CIDRs, comma-separated.
#
# ── Optional on [[wireguard.peers]] ──
#   preshared_key          String — PSK; adds forward secrecy.
#   endpoint               String — "host:port"; site-to-site only.
#   persistent_keepalive   u16    — seconds; 25 typical for NAT.
#
# Example (commented — uncomment + run `oxctl wg-peer add` to grow):
#
# [[wireguard]]
# name = "wg0"
# listen_port = 51820
# # iface = "wg0"                     # default = name
# # key_path = "/etc/oxwrt/wg0.key"   # default
#
# [[wireguard.peers]]
# name = "laptop"
# pubkey = "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
# allowed_ips = "10.8.0.2/32"
# persistent_keepalive = 25
#
# [[wireguard.peers]]
# name = "site-b"
# pubkey = "BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB="
# preshared_key = "CCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCC="
# allowed_ips = "10.8.0.3/32,192.168.100.0/24"
# endpoint = "site-b.example.com:51820"
# persistent_keepalive = 25

# ---------------- Radios ----------------
#
# Per-phy radio configuration. Each [[radios]] entry is one physical
# radio (phy0 = 2.4 GHz, phy1 = 5 GHz on MT7976). SSIDs live in [[wifi]]
# below; a single radio can host multiple SSIDs (multi-BSS) via extra
# [[wifi]] entries that reference the same `radio = "phyN"`.
#
# Required fields: phy, band ("2g" or "5g"), channel.
# All other fields are OPTIONAL — leave unset to get sensible band-
# aware defaults from the generator (see oxwrtd/src/wifi.rs).
#
# ── Required ──
#   phy            "phy0" | "phy1"      — kernel-assigned phy name.
#   band           "2g" | "5g"          — drives hw_mode defaults.
#   channel        u16                  — primary 20 MHz channel.
#
# ── Optional ──
#   disabled                  bool      — skip this radio entirely.
#   country_code              String    — ISO 3166-1. Default "US".
#                                         Required for DFS + regulatory.
#   ht_capab                  String    — bracketed, e.g. "[HT40+]...".
#                                         Overrides the band default.
#   vht_capab                 String    — 5 GHz VHT caps.
#   vht_oper_chwidth          u8 (0-3)  — 0=20/40, 1=80, 2=160, 3=80+80.
#                                         Default 1 on 5 GHz.
#   vht_oper_centr_freq_seg0_idx u16    — VHT center ch. Auto-derived.
#   he_oper_chwidth           u8        — Wi-Fi 6. Default = vht.
#   he_oper_centr_freq_seg0_idx u16     — HE center. Default = vht.
#   ieee80211n/ac/ax          bool      — standards toggles. Defaults:
#                                         n=true; ac=true on 5g only;
#                                         ax=true on both.
#   ieee80211d                bool      — regdomain. Default on.
#   ieee80211h                bool      — DFS/TPC. Default on.
#   beacon_int                u16       — TU. Hostapd default 100.
#   dtim_period               u16       — beacons. Hostapd default 2.
#   extra                     [String]  — raw hostapd.conf lines appended
#                                         to the phy section. Escape
#                                         hatch for options not above.

[[radios]]
phy = "phy0"
band = "2g"
channel = 6
country_code = "US"

[[radios]]
phy = "phy1"
band = "5g"
country_code = "US"
# Channel 36 @ 80 MHz (U-NII-1, channels 36-48). Zero DFS, so
# hostapd beacons immediately on boot — no 60-second CAC wait.
# VHT80 / HE80 defaults fall out of wifi.rs's `vht_seg0(36) == 42`
# lookup, so we don't need to restate chwidth/seg0 here.
#
# For VHT160 throughput, either:
#   (a) accept DFS CAC on channel 36 + vht_oper_chwidth=2 + seg0=50
#       (often fails on MT76 — driver doesn't always signal
#       CAC-COMPLETE back to hostapd on MT7986), or
#   (b) switch to channel=149 + vht_oper_chwidth=2 + seg0=155
#       (U-NII-3, no DFS) — regulatory-domain-dependent.
channel = 36

# ── Full-featured radio example (commented) ──
# [[radios]]
# phy = "phy1"
# band = "5g"
# channel = 149
# disabled = false
# country_code = "US"
# vht_oper_chwidth = 2                     # VHT160
# vht_oper_centr_freq_seg0_idx = 155
# he_oper_chwidth = 2
# he_oper_centr_freq_seg0_idx = 155
# vht_capab = "[SHORT-GI-80][SHORT-GI-160][TX-STBC-2BY1][RX-STBC-1]"
# ht_capab = "[HT40+][SHORT-GI-40][TX-STBC][RX-STBC1][MAX-AMSDU-7935]"
# ieee80211n = true
# ieee80211ac = true
# ieee80211ax = true
# ieee80211d = true
# ieee80211h = true
# beacon_int = 100
# dtim_period = 2
# extra = [
#   "obss_interval=300",
#   "local_pwr_constraint=3",
# ]


# ---------------- WiFi (SSIDs / BSSes) ----------------
#
# Each [[wifi]] is one SSID/VAP on a radio. Multiple [[wifi]] entries
# referencing the same `radio = "phyN"` turn into a multi-BSS hostapd
# config — one process per radio serving all its SSIDs. Each BSS can
# have its own bridge (network), security, passphrase, caps, etc.
#
# The first [[wifi]] per radio is the primary BSS (phyN-ap0); the rest
# become phyN-ap1, phyN-ap2, ... hostapd creates those child netdevs
# via nl80211 automatically. MT7976 supports up to 16 VAPs per radio.
#
# Change via `oxwrtd wifi update <ssid> '{...}'` + `oxwrtd reload`
# to rotate an SSID or PSK without reflashing. Add a new SSID with
# `oxwrtd wifi add '{...}'` + reload — the radio's hostapd picks up
# the new BSS on restart.
#
# ── Required ──
#   radio         String       — matches a [[radios]] phy.
#   ssid          String       — 1-32 chars.
#   network       String       — which [[networks]] entry this BSS
#                                 joins (e.g. "lan").
#
# ── Optional ──
#   security      "open" | "wpa2" | "wpa3-sae" | "wpa2-wpa3"
#                              — default "wpa3-sae".
#   passphrase    String       — 8-63 chars. Required unless open.
#   hidden        bool         — suppress SSID in beacons.
#   bridge        String       — override the bridge this BSS joins.
#                                 Default "br-lan". Use for guest/iot
#                                 isolation on a separate L2 segment.
#   wpa_key_mgmt  String       — e.g. "SAE FT-SAE". Overrides default.
#   rsn_pairwise  String       — default "CCMP".
#   ieee80211w    u8 (0|1|2)   — MFP/802.11w. Default: 1 (WPA2), 2 (SAE).
#   sae_require_mfp bool       — default true for SAE.
#   sae_pwe       u8 (0|1|2)   — SAE PWE method.
#   macaddr_acl   u8 (0|1|2)   — 0=open, 1=allow, 2=deny.
#   auth_algs     u8           — bitmask. 1=open, 2=shared, 3=both.
#   ap_isolate    bool         — wireless client isolation. Default false.
#   max_num_sta   u16          — cap associated clients.
#   wmm_enabled   bool         — QoS/WMM. Hostapd default true.
#   ft_over_ds    bool         — 802.11r Fast BSS Transition.
#   extra         [String]     — raw hostapd.conf lines appended to
#                                 this BSS. Escape hatch.

[[wifi]]
radio = "phy1"
ssid = "oxwrt"
security = "wpa2"
passphrase = "oxwrt-bringup-passphrase"
network = "lan"

[[wifi]]
radio = "phy0"
ssid = "oxwrt-2g"
security = "wpa2"
passphrase = "oxwrt-bringup-passphrase"
network = "lan"

# ── Multi-BSS example (commented) ──
# Three SSIDs on the 5 GHz radio:
#   "home"  — trusted LAN, WPA3 only, 802.11r roaming
#   "guest" — isolated on br-guest, WPA2 transition, capped at 16 clients
#   "iot"   — hidden, separate bridge, lower QoS via `extra`
#
# [[wifi]]
# radio = "phy1"
# ssid = "home"
# security = "wpa3-sae"
# passphrase = "home-password"
# network = "lan"
# ieee80211w = 2
# ft_over_ds = true
# extra = ["rrm_neighbor_report=1", "rrm_beacon_report=1"]
#
# [[wifi]]
# radio = "phy1"
# ssid = "guest"
# security = "wpa2-wpa3"
# passphrase = "guest-password"
# network = "guest"
# bridge = "br-guest"
# ap_isolate = true
# max_num_sta = 16
#
# [[wifi]]
# radio = "phy1"
# ssid = "iot"
# security = "wpa2"
# passphrase = "iot-password"
# network = "iot"
# bridge = "br-iot"
# hidden = true
# extra = [
#   "wmm_ac_be_aifs=3",
#   "multi_ap_profile=1",
# ]
#
# ── Full-featured single BSS example (commented) ──
# Every typed option spelled out. Copy + prune.
#
# [[wifi]]
# radio = "phy1"
# ssid = "example"
# security = "wpa2-wpa3"
# passphrase = "correct-horse-battery-staple"
# network = "lan"
# hidden = false
# bridge = "br-lan"
# wpa_key_mgmt = "WPA-PSK SAE"
# rsn_pairwise = "CCMP"
# ieee80211w = 1
# sae_require_mfp = false
# sae_pwe = 2
# macaddr_acl = 0
# auth_algs = 1
# ap_isolate = false
# max_num_sta = 128
# wmm_enabled = true
# ft_over_ds = true
# extra = [
#   "rrm_neighbor_report=1",
#   "rrm_beacon_report=1",
# ]

# ---------------- Services ----------------
#
# Each [[services]] is one statically-linked Rust or Go binary running
# in its own mount/net/cgroup namespace. `rootfs` is a directory of
# exactly one binary + whatever /etc/passwd bits it needs. Configuration
# comes from env vars (preferred) or read-only bind mounts — see the
# "Service configuration convention" in project memory.

# --- hickory-dns: forwarding resolver + local cache ---
[[services]]
name = "dns"
rootfs = "/usr/lib/oxwrt/services/dns/rootfs"
entrypoint = ["/hickory-dns", "-c", "/etc/named.toml"]
net_mode = "isolated"
veth = { host_ip = "10.53.0.1", peer_ip = "10.53.0.2", prefix = 30 }
memory_max = 134217728       # 128 MiB — quic-ring + rustls bumps hickory's working set above the 64 MiB we had for plain-UDP upstreams. OOM-kills at 64 under DoQ load.
cpu_max = "50000 100000"     # 50% of one CPU
pids_max = 32
depends_on = []
env = { RUST_LOG = "info" }

[[services.binds]]
source = "/usr/lib/oxwrt/services/dns/named.toml"
target = "/etc/named.toml"
# readonly = true  # default

# TLS trust store for DoH upstreams. rustls-platform-verifier
# (the default in hickory-dns-0.25 when `https-ring` is enabled)
# reads from /etc/ssl/certs — which ships via ca-bundle on the
# host rootfs. Bind-mounting it into the container rootfs read-only
# keeps the container footprint tiny while giving rustls a real
# trust store to validate upstream certificates against.
[[services.binds]]
source = "/etc/ssl/certs"
target = "/etc/ssl/certs"

# Hardening defaults are safe for hickory on DoH — the default
# retain list covers bind(53) + privilege drop to `nobody`.
# landlock = true

# --- coredhcp: DHCPv4 server for the LAN + guest subnets ---
[[services]]
name = "dhcp"
rootfs = "/usr/lib/oxwrt/services/dhcp/rootfs"
entrypoint = ["/coredhcp", "-c", "/etc/coredhcp.yml"]
# DHCP servers need raw-ish socket access to read/write the full Ethernet
# frame, which means they live on the host netns.
net_mode = "host"
memory_max = 67108864
pids_max = 32
depends_on = ["dns"]         # coredhcp needs DNS to log hostnames

[[services.binds]]
source = "/usr/lib/oxwrt/services/dhcp/coredhcp.yml"
target = "/etc/coredhcp.yml"
# readonly = true (default)

[[services.binds]]
source = "/etc/oxwrt/coredhcp/leases.txt"
target = "/var/lib/coredhcp/leases.txt"
readonly = false             # coredhcp needs to write lease state
# Source is /etc/oxwrt/... not /var/lib/oxwrt/... because OpenWrt's /var
# is a symlink to /tmp (tmpfs). Staging files under /var in the squashfs
# overlay clobbers the symlink and breaks procd's ubus chown (see
# Makefile comment in imagebuilder-stage).

# coredhcp needs NET_RAW + NET_ADMIN for its raw sockets on top of the
# default four caps. Landlock's writable-bind-mount rule automatically
# covers /var/lib/coredhcp because of the readonly=false bind above.
[services.security]
caps = [
  "SETUID",
  "SETGID",
  "SETPCAP",
  "NET_BIND_SERVICE",
  "NET_RAW",
  "NET_ADMIN",
]
# no_new_privs = true   # default
# seccomp = true        # default
# landlock = true       # default

# --- hostapd-5g: 5 GHz wifi AP on phy1 ---
#
# One hostapd process per radio (failure isolation: one radio crashing
# doesn't take the other down). Same rootfs, different config + ctrl
# socket dir. Both bridged into br-lan → same DHCP/DNS/RA/firewall for
# every wifi + wired client.
[[services]]
name = "hostapd-5g"
rootfs = "/usr/lib/oxwrt/services/hostapd/rootfs"
entrypoint = ["/sbin/hostapd", "/etc/hostapd-5g.conf"]
net_mode = "host"
memory_max = 67108864
pids_max = 16
depends_on = []

[[services.binds]]
# Generated by oxwrtd wifi::write_all() from [[radios]] + [[wifi]]
# entries. /etc/oxwrt/ is on overlayfs (writable + preserved across
# sysupgrade), so reload-driven CRUD edits take effect on the next
# hostapd restart.
source = "/etc/oxwrt/hostapd/phy1.conf"
target = "/etc/hostapd-5g.conf"

# hostapd's ctrl socket lives on the container's /tmp tmpfs (always
# writable, always ephemeral — matches what the socket actually is).
# The former /etc/oxwrt/hostapd-run/ bind put UNIX domain sockets
# under the sysupgrade.conf-preserved tree, which broke the config-
# backup tar step ("socket can not be archived").

[services.security]
caps = [
  "SETUID", "SETGID", "SETPCAP",
  "NET_BIND_SERVICE", "NET_ADMIN", "NET_RAW",
]

# --- hostapd-2g: 2.4 GHz wifi AP on phy0 ---
#
# Different SSID ("oxwrt-2g") during bring-up so it's obvious which
# band a client is on. Separate ctrl socket dir to avoid collision with
# the 5 GHz instance.
[[services]]
name = "hostapd-2g"
rootfs = "/usr/lib/oxwrt/services/hostapd/rootfs"
entrypoint = ["/sbin/hostapd", "/etc/hostapd-2g.conf"]
net_mode = "host"
memory_max = 67108864
pids_max = 16
depends_on = []

[[services.binds]]
# Generated — same rationale as hostapd-5g above.
source = "/etc/oxwrt/hostapd/phy0.conf"
target = "/etc/hostapd-2g.conf"

# See hostapd-5g note — ctrl socket lives on container tmpfs /tmp.

[services.security]
caps = [
  "SETUID", "SETGID", "SETPCAP",
  "NET_BIND_SERVICE", "NET_ADMIN", "NET_RAW",
]

# --- corerad: IPv6 Router Advertisement daemon ---
#
# Sends ICMPv6 RAs on br-lan so clients SLAAC from our ULA /64. Pairs
# with coredhcp (DHCPv4 now, DHCPv6 optional later). Replaces the RA
# half of odhcpd-ipv6only (which we dropped in Stage 5).
#
# net_mode=host: corerad binds a raw ICMPv6 socket on br-lan and reads
# rtnetlink events for link/addr changes. Both require being in the
# host netns.
[[services]]
name = "corerad"
rootfs = "/usr/lib/oxwrt/services/corerad/rootfs"
entrypoint = ["/corerad", "-c", "/etc/corerad.toml"]
net_mode = "host"
memory_max = 33554432
pids_max = 16
depends_on = []

[[services.binds]]
# Source is the oxwrtd-generated config (regenerated from
# [[networks]] ipv6_* fields on every boot + reload). See
# oxwrt-linux/src/corerad.rs::write_config. Bundled fallback at
# /usr/lib/oxwrt/services/corerad/corerad.toml is ignored once the
# generated file exists — first boot lands the generated file
# before corerad starts, so no race.
source = "/etc/oxwrt/corerad.toml"
target = "/etc/corerad.toml"

# corerad needs CAP_NET_RAW for the ICMPv6 raw socket (mandatory) and
# CAP_NET_ADMIN so it can toggle /proc/sys/net/ipv6/conf/<if>/accept_ra
# + subscribe to rtnetlink link/addr notifications. Without NET_ADMIN
# it still runs but won't disable kernel autoconf on the advertising
# iface.
[services.security]
caps = ["SETUID", "SETGID", "SETPCAP", "NET_BIND_SERVICE", "NET_RAW", "NET_ADMIN"]

# --- ntpd-rs: NTP client + server ---
[[services]]
name = "ntp"
rootfs = "/usr/lib/oxwrt/services/ntp/rootfs"
entrypoint = ["/ntp-daemon", "-c", "/etc/ntp.toml"]
net_mode = "isolated"
veth = { host_ip = "10.123.0.1", peer_ip = "10.123.0.2", prefix = 30 }
memory_max = 33554432
pids_max = 16
depends_on = ["dns"]         # needs DNS to resolve pool.ntp.org

[[services.binds]]
source = "/usr/lib/oxwrt/services/ntp/ntp.toml"
target = "/etc/ntp.toml"

# ntpd-rs that actually steps the clock needs SYS_TIME; the default
# retain list doesn't include it, so override here.
[services.security]
caps = ["SETUID", "SETGID", "SETPCAP", "NET_BIND_SERVICE", "SYS_TIME"]

# --- debug-ssh: dropbear escape hatch for bring-up ---
#
# Runs under the same supervisor as any other service so an operator
# can ssh in when the control plane misbehaves — without it, a bug
# after the PID-1 takeover means "physical power cycle + rollback".
# Listens on port 2222 so it doesn't fight stock dropbear while we're
# running as a side binary. Production builds should omit this entry
# (or the matching rootfs package) for the appliance model.
#
# Only spawns when oxwrtd runs in --services-only or --init mode;
# ignored by --control-only (which keeps the supervisor empty).
# The rootfs is built by /etc/uci-defaults/97-oxwrt-debug-ssh-rootfs
# from the stock busybox + dropbear on first boot.
[[services]]
name = "debug-ssh"
rootfs = "/usr/lib/oxwrt/services/debug-ssh/rootfs"
entrypoint = ["/sbin/dropbear", "-F", "-E", "-R", "-s", "-p", "2222", "-P", "/tmp/dropbear.pid"]
# `net_mode = host` — dropbear binds on the real LAN bridge. An
# isolated veth would require exposing port 2222 via DNAT, which is a
# lot of plumbing for "the operator wants a shell."
net_mode = "host"
pids_max = 64
depends_on = []

# /dev/pts must be bind-mounted writable so dropbear can allocate
# pseudo-ttys for interactive sessions (ptmx + /dev/pts/N). Everything
# else in the rootfs is read-only by default.
[[services.binds]]
source = "/dev/pts"
target = "/dev/pts"
readonly = false

# Host keys at /etc/dropbear/ must be writable (dropbear `-R` auto-
# generates ed25519/rsa on first start if missing) AND persist across
# reboots / sysupgrade (clients pin the host key, regen would break
# every pinned client). Bind-mount a dir under /etc/oxwrt/ — that
# path is on the overlay and preserved by sysupgrade.conf.
[[services.binds]]
source = "/etc/oxwrt/debug-ssh-keys"
target = "/etc/dropbear"
readonly = false

# Dropbear is a legacy C codebase that needs more caps than the
# default four: CHOWN/DAC_OVERRIDE/FOWNER for pty ownership transfer
# to the logged-in user, SETUID/SETGID/SETPCAP to drop privilege to
# that user, KILL to signal child shells, SYS_CHROOT for the
# user-session chroot, NET_BIND_SERVICE just in case the port
# changes below 1024. Seccomp and landlock off — adds weeks of
# policy-authoring work for a service that only runs during
# bring-up. Tighten later.
[services.security]
caps = ["SETUID", "SETGID", "SETPCAP", "NET_BIND_SERVICE", "CHOWN", "DAC_OVERRIDE", "FOWNER", "KILL", "SYS_CHROOT"]
no_new_privs = true
seccomp = false
seccomp_allow = []
user_namespace = false
landlock = false

# ---------------- Metrics ----------------
#
# Optional Prometheus-format /metrics endpoint. Plain HTTP, no auth —
# bind to the LAN IP and rely on firewall zone rules to keep it off
# WAN. Exports service state, AP operstate, WAN lease, WG handshakes,
# firewall rule count. Comment out to disable.
#
# [metrics]
# listen = "192.168.50.1:9100"

# ---------------- Control plane ----------------
#
# Listen on [::1]:51820 (loopback) AND on the LAN bridge IP so the
# operator can reach it from their laptop without ssh. Adding a
# network's router IP (e.g. "10.99.0.1:51820") would also work
# if `allow_control_plane = true` on that zone.

[control]
listen = ["[::1]:51820", "192.168.50.1:51820"]
authorized_keys = "/etc/oxwrt/authorized_keys"
