# hostapd config for the 5 GHz radio (phy1) on MT7986 / MT7976.
#
# Single BSS, WPA2-PSK, bridged into br-lan so wifi clients share the
# LAN subnet (192.168.1.0/24 + fdbe:cafe::/64). coredhcp + corerad see
# them as just more br-lan clients.
#
# Bound to phy1 (5 GHz) rather than phy0 (2.4 GHz) by naming the
# interface `phy1-ap0` — hostapd's nl80211 driver derives the phy from
# the `phyN-` prefix when creating an AP-mode interface. Same
# convention OpenWrt's netifd uses.

interface=phy1-ap0
bridge=br-lan
driver=nl80211
ctrl_interface=/var/run/hostapd
ctrl_interface_group=0

ssid=oxwrt
country_code=US

# 5 GHz, channel 36, 80 MHz-wide VHT centered at freq seg 42.
hw_mode=a
channel=36
ieee80211n=1
ieee80211ac=1
ieee80211ax=1
ht_capab=[HT40+][SHORT-GI-40][TX-STBC][RX-STBC1][MAX-AMSDU-7935][DSSS_CCK-40]
vht_oper_chwidth=1
vht_oper_centr_freq_seg0_idx=42
vht_capab=[SHORT-GI-80][TX-STBC-2BY1][RX-STBC-1][RX-ANTENNA-PATTERN][TX-ANTENNA-PATTERN]
he_oper_chwidth=1
he_oper_centr_freq_seg0_idx=42

# Country/regdomain enforcement — without this some channels are unusable.
ieee80211d=1
ieee80211h=1

# Security: WPA2-PSK, CCMP. PSK here is a placeholder for bring-up;
# operators should rotate via the CRUD RPC (future work) rather than
# shipping the same key in every image.
wpa=2
wpa_passphrase=oxwrt-bringup-passphrase
wpa_key_mgmt=WPA-PSK
rsn_pairwise=CCMP
ieee80211w=1

# MAC ACL: open (all stations accepted). Operator-authenticated by PSK.
macaddr_acl=0
auth_algs=1
ignore_broadcast_ssid=0

# Client-isolation off — wifi clients can talk to wired LAN clients
# (they share br-lan). If we want guest isolation later that's a
# separate BSS on a separate bridge.
ap_isolate=0
