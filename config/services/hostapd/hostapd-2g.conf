# hostapd config for the 2.4 GHz radio (phy0) on MT7986 / MT7976.
#
# Second AP on phy0, separate SSID during bring-up so operators can
# see which band a client associated with. A later iteration can
# unify "oxwrt" across both bands for seamless band steering.
#
# Channel 6 (central 2.4 GHz), HT40+ with overlap-protection, Wi-Fi 6
# enabled on the MT7976 (it supports HE on both bands).

interface=phy0-ap0
bridge=br-lan
driver=nl80211
ctrl_interface=/tmp/hostapd
ctrl_interface_group=0

ssid=oxwrt-2g
country_code=US

# 2.4 GHz, channel 6, 40 MHz-wide HT.
hw_mode=g
channel=6
ieee80211n=1
ieee80211ax=1
# HT40+ puts the secondary channel above (ch 10). HT40- would need
# ch 1/2/3 as the primary.
ht_capab=[HT40+][SHORT-GI-20][SHORT-GI-40][TX-STBC][RX-STBC1][MAX-AMSDU-7935]

# Country/regdomain enforcement.
ieee80211d=1
ieee80211h=1

# Security: same PSK as 5 GHz during bring-up — one passphrase to
# remember across bands. Rotate together via CRUD (future work).
wpa=2
wpa_passphrase=oxwrt-bringup-passphrase
wpa_key_mgmt=WPA-PSK
rsn_pairwise=CCMP
ieee80211w=1

# Open MAC ACL, PSK-authenticated.
macaddr_acl=0
auth_algs=1
ignore_broadcast_ssid=0
ap_isolate=0
