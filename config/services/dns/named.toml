# hickory-dns configuration for oxwrt.
#
# Forwarding resolver with local cache. This file is bind-mounted
# read-only into the dns container at /etc/named.toml.

listen_addrs_ipv4 = ["0.0.0.0"]
listen_port = 15353
directory = "/var"

# zone_type: hickory-dns 0.25 removed "Forward"; accepted values are
# Primary / Secondary / External. For a pure forwarding resolver we
# want External — the zone content lives elsewhere and we just route
# queries through the upstream via the forward store below.
[[zones]]
zone = "."
zone_type = "External"

# Upstream resolvers via DNS-over-HTTPS (RFC 8484). Enabled by
# building hickory-dns with `--features "https-ring quic-ring"`
# (see Makefile — both protocols' feature flags are on so an
# operator can swap between DoH and DoQ by editing this file
# alone). Trust store ships via ca-bundle at /etc/ssl/certs,
# bind-mounted into the dns service container.
#
# DoH is the live default because DoQ hung — hickory's
# `connecting config=NameServerConfig {... Quic ...}` debug log
# fires, but no subsequent quinn log (even at quinn=debug), no
# outbound UDP:853 in conntrack, and the query times out after
# 10s. The quinn Initial packet appears to never leave the
# kernel. Seccomp was excluded as a cause (DoQ still hangs with
# seccomp=false). Hypothesis: rustls ClientConfig's QUIC-specific
# setup path fails silently in hickory-net 0.26 + quinn 0.11,
# leaving a pending future. Needs more digging — out-of-scope
# for now. To retry DoQ: swap the connections entries below to
#   port = 853
#   protocol = { type = "quic", server_name = "cloudflare-dns.com" }
#
# hickory 0.26 schema: `ip` + nested `[[...connections]]` array.
# Two upstream servers so a single vendor outage doesn't take DNS
# offline; hickory round-robins between them.
[[zones.stores]]
type = "forward"

[[zones.stores.name_servers]]
ip = "1.1.1.1"
trust_negative_responses = false

[[zones.stores.name_servers.connections]]
port = 443
protocol = { type = "https", server_name = "cloudflare-dns.com", path = "/dns-query" }

[[zones.stores.name_servers]]
ip = "9.9.9.9"
trust_negative_responses = false

[[zones.stores.name_servers.connections]]
port = 443
protocol = { type = "https", server_name = "dns.quad9.net", path = "/dns-query" }
