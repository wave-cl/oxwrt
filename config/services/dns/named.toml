# hickory-dns configuration for oxwrt.
#
# Forwarding resolver with local cache. This file is bind-mounted
# read-only into the dns container at /etc/named.toml.

listen_addrs_ipv4 = ["0.0.0.0"]
listen_port = 15353
directory = "/var"

# zone_type: hickory-dns 0.25 removed "Forward"; accepted values are
# Primary / Secondary / External. For a pure forwarding resolver we
# want External — the zone content lives elsewhere and we just route
# queries through the upstream via the forward store below.
[[zones]]
zone = "."
zone_type = "External"

# Upstream resolvers via DNS-over-HTTPS (RFC 8484). Enabled by
# building hickory-dns with `--features https-ring` (see Makefile).
# Trust store comes from ca-bundle on-device at /etc/ssl/certs,
# bind-mounted into the dns service container via oxwrt.toml's
# [[services.binds]].
#
# hickory 0.26 reshaped the name_servers schema: `ip` replaced
# `socket_addr`, and protocol config moved under a nested
# `[[zones.stores.name_servers.connections]]` array. One
# connections entry per protocol/port combination — this config
# says "reach 1.1.1.1 on port 443 via HTTPS with SNI=cloudflare-
# dns.com, fetching /dns-query". Multiple connections per server
# would let hickory fall back between (e.g.) DoH and plain UDP —
# we don't do that to avoid leaking queries over plain DNS.
[[zones.stores]]
type = "forward"

[[zones.stores.name_servers]]
ip = "1.1.1.1"
trust_negative_responses = false

[[zones.stores.name_servers.connections]]
port = 443
protocol = { type = "https", server_name = "cloudflare-dns.com", path = "/dns-query" }

[[zones.stores.name_servers]]
ip = "9.9.9.9"
trust_negative_responses = false

[[zones.stores.name_servers.connections]]
port = 443
protocol = { type = "https", server_name = "dns.quad9.net", path = "/dns-query" }
