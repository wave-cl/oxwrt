# coredhcp configuration for oxwrt.
#
# Serves DHCPv4 leases on the LAN bridge. This file is bind-mounted
# read-only into the dhcp container at /etc/coredhcp.yml.

server4:
  listen:
    - "%br-lan"
  plugins:
    - lease_time: 3600
    - server_id: 192.168.8.1
    - dns: 192.168.8.1
    - router: 192.168.8.1
    - netmask: 255.255.255.0
    - range:
        start: 192.168.8.100
        end: 192.168.8.250
        lease_time: 3600
    - file:
        path: /var/lib/coredhcp/leases.txt
